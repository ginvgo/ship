<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能 AI 视频合成工作站 (Pexels + 拖拽文本 + 混流引擎)</title>
    <style>
        :root {
            --bg: #0a0615;
            --bg-soft: #140b2a;
            --panel: rgba(19, 12, 36, 0.84);
            --panel-border: rgba(129, 75, 255, 0.34);
            --panel-hover: rgba(146, 95, 255, 0.5);
            --text: #ece8ff;
            --text-soft: #b9afd6;
            --primary: #8b35ff;
            --primary-strong: #a44bff;
            --accent: #18d9c7;
            --danger: #ff4f8b;
            --success: #2fd487;
            --shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
            --grid-gap: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Rajdhani", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(1200px 600px at 15% -15%, rgba(168, 64, 255, 0.18), transparent 55%),
                radial-gradient(1000px 700px at 100% 10%, rgba(24, 217, 199, 0.12), transparent 48%),
                linear-gradient(145deg, #090512 0%, #0d0720 46%, #090512 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .studio-topbar {
            height: 62px;
            padding: 10px 18px;
            border-bottom: 1px solid rgba(128, 70, 255, 0.28);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(12, 7, 24, 0.88);
            backdrop-filter: blur(8px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.4px;
        }

        .brand-badge {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            background: linear-gradient(135deg, #7e34ff, #bb3fff);
            box-shadow: 0 0 16px rgba(156, 64, 255, 0.58);
            display: grid;
            place-items: center;
            font-weight: 700;
            color: #fff;
        }

        .brand h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .brand small {
            color: var(--text-soft);
            font-size: 13px;
            margin-left: 8px;
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-soft);
            font-size: 13px;
        }

        .status-pill {
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid rgba(83, 215, 168, 0.45);
            color: #8fffd4;
            background: rgba(14, 57, 48, 0.42);
        }

        .app-grid {
            flex: 1;
            min-height: 0;
            padding: var(--grid-gap);
            display: grid;
            grid-template-columns: 320px minmax(360px, 1fr) 450px;
            gap: var(--grid-gap);
            overflow: hidden;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 14px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            min-height: 0;
        }

        .panel:hover {
            border-color: var(--panel-hover);
        }

        h2,
        h3 {
            margin: 0;
            font-size: 15px;
            letter-spacing: 0.4px;
            color: #fff;
            border-bottom: 1px solid rgba(102, 64, 188, 0.5);
            padding-bottom: 9px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .ctrl-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 12px;
            color: var(--text-soft);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row > .ctrl-group,
        .row > div {
            flex: 1;
        }

        input,
        select,
        textarea {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(111, 79, 196, 0.66);
            background: rgba(9, 6, 19, 0.93);
            color: #f3f1ff;
            padding: 9px 10px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(164, 78, 255, 0.95);
            box-shadow: 0 0 0 2px rgba(139, 53, 255, 0.22);
        }

        textarea {
            resize: vertical;
            min-height: 58px;
        }

        input[type="color"] {
            padding: 3px;
            height: 38px;
        }

        button {
            border: none;
            border-radius: 9px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s, opacity 0.15s;
            background: linear-gradient(135deg, #6728dd, #8f34ff);
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn-green {
            background: linear-gradient(135deg, #08b99b, #11d48b);
        }

        .btn-red {
            background: linear-gradient(135deg, #e53f7f, #ff5d66);
        }

        .scene-card {
            background: linear-gradient(170deg, rgba(38, 21, 73, 0.92), rgba(23, 14, 45, 0.93));
            border: 1px solid rgba(130, 86, 214, 0.48);
            border-left: 3px solid var(--primary);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: cardIn 0.24s ease;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scene-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #c9b3ff;
            font-weight: 700;
            font-size: 14px;
        }

        .scene-remove {
            background: transparent;
            border: 1px solid rgba(255, 102, 162, 0.5);
            color: #ff8bb6;
            padding: 3px 8px;
            border-radius: 7px;
            font-size: 12px;
        }

        .workspace {
            flex: 0 0 clamp(220px, 48vh, 560px);
            min-height: 220px;
            max-height: 560px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background:
                radial-gradient(500px 240px at 70% 10%, rgba(132, 49, 255, 0.14), transparent 60%),
                #05070f;
            border: 1px solid rgba(99, 64, 184, 0.62);
            overflow: auto;
            padding: 10px;
        }

        .preview-box {
            position: relative;
            width: 100%;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16/9;
            border-radius: 10px;
            background: #0f1222;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: inset 0 0 0 1px rgba(143, 88, 255, 0.28), 0 16px 40px rgba(1, 0, 5, 0.6);
        }

        .preview-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #textLayer {
            position: absolute;
            inset: 0;
            z-index: 20;
        }

        #mainSubtitle {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.75);
            z-index: 10;
            pointer-events: none;
        }

        .draggable-text {
            position: absolute;
            cursor: grab;
            user-select: none;
            white-space: nowrap;
            padding: 4px 12px 10px 6px;
            border: 1px dashed transparent;
            border-radius: 6px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-weight: 700;
            touch-action: none;
            transition: border-color 0.12s, background 0.12s;
        }

        .draggable-text-content {
            pointer-events: none;
        }

        .text-resize-handle {
            position: absolute;
            right: 2px;
            bottom: 2px;
            width: 9px;
            height: 9px;
            border-right: 2px solid rgba(230, 220, 255, 0.9);
            border-bottom: 2px solid rgba(230, 220, 255, 0.9);
            border-radius: 1px;
            cursor: nwse-resize;
            opacity: 0.85;
            touch-action: none;
        }

        .draggable-text.active .text-resize-handle {
            border-right-color: #be92ff;
            border-bottom-color: #be92ff;
        }

        .draggable-text:hover {
            border-color: rgba(219, 196, 255, 0.75);
        }

        .draggable-text.active {
            border-color: #9a57ff;
            background: rgba(134, 58, 255, 0.25);
        }

        .toolbar-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .status-log {
            font-size: 12px;
            text-align: center;
            color: #a6f2d2;
            border-top: 1px solid rgba(108, 72, 199, 0.48);
            padding-top: 8px;
            min-height: 20px;
        }

        .text-inspector {
            border: 1px solid rgba(107, 70, 199, 0.55);
            border-radius: 10px;
            padding: 10px;
            background: rgba(12, 7, 24, 0.66);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .inspector-title {
            font-size: 12px;
            font-weight: 700;
            color: #d8c9ff;
        }

        #scenesContainer {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            padding-right: 3px;
        }

        canvas {
            display: none;
        }

        @media (max-width: 1300px) {
            .app-grid {
                grid-template-columns: 300px 1fr;
                grid-template-areas:
                    "left right"
                    "middle right";
            }

            .left-panel { grid-area: left; }
            .middle-panel { grid-area: middle; }
            .right-panel { grid-area: right; }
        }

        @media (max-width: 980px) {
            body {
                overflow: auto;
            }

            .studio-topbar {
                flex-wrap: wrap;
                height: auto;
                gap: 8px;
            }

            .app-grid {
                height: auto;
                min-height: auto;
                grid-template-columns: 1fr;
                grid-template-areas: none;
                overflow: visible;
            }

            .panel {
                overflow: visible;
            }

            .workspace {
                min-height: 220px;
            }
        }
    </style>
</head>
<body>
    <header class="studio-topbar">
        <div class="brand">
            <div class="brand-badge">AI</div>
            <div>
                <h1>AI Studio</h1>
                <small>全能视频合成工作站</small>
            </div>
        </div>
        <div class="top-right">
            <span id="sceneCounter">场景: 1</span>
            <span class="status-pill">状态: 待命</span>
        </div>
    </header>

    <div class="app-grid">
        <div class="panel left-panel">
            <h2>全局设置 & API</h2>

            <div class="ctrl-group">
                <label style="color:var(--accent)">Pexels API Key (必填)</label>
                <input type="text" id="pexelsKey" placeholder="在此粘贴 Pexels API Key..." onchange="saveKey()">
            </div>

            <div class="ctrl-group">
                <label>视频导出尺寸</label>
                <select id="videoSize" onchange="updatePreviewRatio()">
                    <option value="1920,1080">16:9 高清横屏 (1920x1080)</option>
                    <option value="1080,1920">9:16 高清竖屏 (1080x1920)</option>
                    <option value="1080,1080">1:1 正方形 (1080x1080)</option>
                    <option value="1200,900">4:3 传统横屏 (1200x900)</option>
                    <option value="1080,1350">4:5 社交竖屏 (1080x1350)</option>
                </select>
            </div>

            <div class="ctrl-group">
                <label>全局背景音乐 (BGM)</label>
                <input type="file" id="bgmInput" accept="audio/mp3,audio/wav,audio/mpeg,audio/*">
                <label>音量调节: <span id="bgmVolVal">15%</span></label>
                <input type="range" id="bgmVolume" min="0" max="1" step="0.05" value="0.15" oninput="document.getElementById('bgmVolVal').innerText = Math.round(this.value*100)+'%'">
            </div>

            <h2>主字幕样式 (底部旁白)</h2>
            <div class="ctrl-group">
                <label>字体库</label>
                <select id="fontFamily">
                    <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
                    <option value="SimHei, sans-serif">黑体</option>
                    <option value="KaiTi, serif">楷体</option>
                </select>
            </div>
            <div class="row">
                <div class="ctrl-group">
                    <label>字号大小</label>
                    <input type="number" id="fontSize" value="55" min="16" max="150">
                </div>
                <div class="ctrl-group">
                    <label>字体颜色</label>
                    <input type="color" id="fontColor" value="#ffffff">
                </div>
            </div>
        </div>

        <div class="panel middle-panel">
            <h2>
                场景编排轨道
                <button onclick="addScene()" class="btn-green" style="padding:6px 10px;">+ 添加场景</button>
            </h2>
            <div id="scenesContainer"></div>
        </div>

        <div class="panel right-panel">
            <h2>
                可视化监视器
                <div style="display:flex; gap:6px;">
                    <button onclick="addTextBox()" style="padding:6px 10px;">+ 自由文本</button>
                    <button onclick="deleteActiveTextBox()" class="btn-red" style="padding:6px 10px;">删文本</button>
                </div>
            </h2>

            <div class="workspace">
                <div class="preview-box" id="previewBox" style="aspect-ratio: 16/9;">
                    <video id="mediaPlayer" class="preview-media" muted crossOrigin="anonymous" playsinline></video>
                    <div id="mainSubtitle"></div>
                    <div id="textLayer"></div>
                </div>
            </div>

            <div class="text-inspector">
                <div class="inspector-title">自由文本属性 (选中后可编辑)</div>
                <div class="ctrl-group">
                    <label>内容</label>
                    <input id="textEditContent" type="text" placeholder="先在预览区点击一个文本" disabled>
                </div>
                <div class="row">
                    <div class="ctrl-group">
                        <label>颜色</label>
                        <input id="textEditColor" type="color" value="#ffffff" disabled>
                    </div>
                    <div class="ctrl-group">
                        <label>字号</label>
                        <input id="textEditSize" type="number" value="24" min="12" max="300" disabled>
                    </div>
                </div>
                <div class="ctrl-group">
                    <label>HEX 颜色值</label>
                    <input id="textEditHex" type="text" value="#ffffff" placeholder="#RRGGBB" disabled>
                </div>
                <div class="row">
                    <div class="ctrl-group">
                        <label>X (%)</label>
                        <input id="textEditX" type="number" value="30" min="0" max="100" step="0.1" disabled>
                    </div>
                    <div class="ctrl-group">
                        <label>Y (%)</label>
                        <input id="textEditY" type="number" value="30" min="0" max="100" step="0.1" disabled>
                    </div>
                </div>
            </div>

            <div class="toolbar-row">
                <button id="generateBtn" class="btn-green" style="height:42px;">第一步: 解析场景资产 (获取视频/配音)</button>
                <div style="display:flex; gap:10px;">
                    <button id="playRecordBtn" class="btn-red" style="flex:1; height:42px;" disabled>第二步: 播放并录制</button>
                    <button id="downloadBtn" style="flex:1; height:42px;" disabled>第三步: 下载完整视频</button>
                </div>
                <div id="statusLog" class="status-log">等待操作...</div>
            </div>
        </div>
    </div>

    <canvas id="renderCanvas" width="1920" height="1080"></canvas>

    <script>
        const pexelsInput = document.getElementById('pexelsKey');
        if (localStorage.getItem('pexels_key')) pexelsInput.value = localStorage.getItem('pexels_key');
        function saveKey() { localStorage.setItem('pexels_key', pexelsInput.value.trim()); }

        function clampNum(value, min, max) {
            if (!Number.isFinite(value)) return min;
            return Math.min(max, Math.max(min, value));
        }

        function formatPct(value) {
            return (Math.round(value * 10) / 10).toString();
        }

        function normalizeHexColor(raw) {
            if (!raw) return null;
            let hex = raw.trim().replace(/^#/, '');
            if (/^[0-9a-fA-F]{3}$/.test(hex)) {
                hex = hex.split('').map(ch => ch + ch).join('');
            }
            if (!/^[0-9a-fA-F]{6}$/.test(hex)) return null;
            return `#${hex.toLowerCase()}`;
        }

        function updatePreviewFrameSize() {
            if (!DOM.workspace || !DOM.preview) return;
            const [w, h] = document.getElementById('videoSize').value.split(',').map(Number);
            const ratio = w / h;
            const maxW = Math.max(120, DOM.workspace.clientWidth - 20);
            const maxH = Math.max(120, DOM.workspace.clientHeight - 20);

            let targetW = maxW;
            let targetH = targetW / ratio;
            if (targetH > maxH) {
                targetH = maxH;
                targetW = targetH * ratio;
            }

            DOM.preview.style.width = `${Math.floor(targetW)}px`;
            DOM.preview.style.height = `${Math.floor(targetH)}px`;
        }

        function updatePreviewRatio() {
            const [w, h] = document.getElementById('videoSize').value.split(',').map(Number);
            document.getElementById('previewBox').style.aspectRatio = `${w} / ${h}`;
            updatePreviewFrameSize();
            repositionTextBoxes();
        }

        let sceneCount = 0;
        let activeTextBox = null;

        const Engine = {
            scenes: [],
            textBoxes: [],
            audioCtx: null,
            bgmBuffer: null,
            isPlaying: false,
            currentIdx: 0,
            mediaRecorder: null,
            recordedChunks: [],
            animFrame: null,
            activeVoice: null,
            activeVoiceEl: null,
            activeVoiceNode: null,
            sceneTimer: null,
            objectUrls: [],
            dragState: { box: null, startX: 0, startY: 0, startL: 0, startT: 0 },
            resizeState: { box: null, startX: 0, startY: 0, startSize: 24 }
        };

        const DOM = {
            log: document.getElementById('statusLog'),
            canvas: document.getElementById('renderCanvas'),
            ctx: document.getElementById('renderCanvas').getContext('2d'),
            player: document.getElementById('mediaPlayer'),
            subtitle: document.getElementById('mainSubtitle'),
            preview: document.getElementById('previewBox'),
            workspace: document.querySelector('.workspace'),
            textLayer: document.getElementById('textLayer'),
            sceneCounter: document.getElementById('sceneCounter'),
            statusPill: document.querySelector('.status-pill'),
            textEditContent: document.getElementById('textEditContent'),
            textEditColor: document.getElementById('textEditColor'),
            textEditSize: document.getElementById('textEditSize'),
            textEditHex: document.getElementById('textEditHex'),
            textEditX: document.getElementById('textEditX'),
            textEditY: document.getElementById('textEditY')
        };

        function log(msg, level = 'info') {
            DOM.log.innerText = `> ${msg}`;
            const color = level === 'error' ? '#ff9dc1' : level === 'success' ? '#93ffd5' : '#b8f5dc';
            DOM.log.style.color = color;
        }

        function setStatus(label, mode = 'idle') {
            DOM.statusPill.innerText = `状态: ${label}`;
            if (mode === 'busy') {
                DOM.statusPill.style.borderColor = 'rgba(255, 165, 79, 0.55)';
                DOM.statusPill.style.background = 'rgba(76, 43, 8, 0.42)';
                DOM.statusPill.style.color = '#ffc894';
            } else if (mode === 'ok') {
                DOM.statusPill.style.borderColor = 'rgba(83, 215, 168, 0.45)';
                DOM.statusPill.style.background = 'rgba(14, 57, 48, 0.42)';
                DOM.statusPill.style.color = '#8fffd4';
            } else if (mode === 'error') {
                DOM.statusPill.style.borderColor = 'rgba(255, 110, 148, 0.55)';
                DOM.statusPill.style.background = 'rgba(69, 18, 37, 0.42)';
                DOM.statusPill.style.color = '#ff98bc';
            } else {
                DOM.statusPill.style.borderColor = 'rgba(165, 138, 237, 0.5)';
                DOM.statusPill.style.background = 'rgba(25, 18, 48, 0.52)';
                DOM.statusPill.style.color = '#d8c9ff';
            }
        }

        function updateSceneCounter() {
            const count = document.querySelectorAll('.scene-card').length;
            DOM.sceneCounter.innerText = `场景: ${count}`;
        }

        function releaseObjectUrls() {
            Engine.objectUrls.forEach(url => URL.revokeObjectURL(url));
            Engine.objectUrls = [];
        }

        function clearPlaybackState() {
            clearTimeout(Engine.sceneTimer);
            Engine.sceneTimer = null;
            if (Engine.activeVoice) {
                try { Engine.activeVoice.stop(); } catch (e) {}
                Engine.activeVoice.disconnect();
                Engine.activeVoice = null;
            }
            if (Engine.activeVoiceEl) {
                Engine.activeVoiceEl.onended = null;
                Engine.activeVoiceEl.onerror = null;
                try { Engine.activeVoiceEl.pause(); } catch (e) {}
                Engine.activeVoiceEl = null;
            }
            if (Engine.activeVoiceNode) {
                try { Engine.activeVoiceNode.disconnect(); } catch (e) {}
                Engine.activeVoiceNode = null;
            }
        }

        function addScene() {
            sceneCount++;
            const id = sceneCount;
            const html = `
                <div class="scene-card" id="scene-${id}" data-scene-id="${id}">
                    <div class="scene-header">
                        <span>场景 ${id}</span>
                        <button class="scene-remove" onclick="removeScene(${id})">删除</button>
                    </div>

                    <div class="ctrl-group">
                        <label>素材来源</label>
                        <select id="source-${id}" onchange="toggleSource(${id})">
                            <option value="pexels">自动搜索 Pexels 视频</option>
                            <option value="local">上传本地视频素材</option>
                        </select>
                    </div>

                    <div id="input-pexels-${id}" class="ctrl-group">
                        <label>Pexels 英文关键词</label>
                        <input type="text" id="keyword-${id}" placeholder="例如: nature, cyberpunk city">
                    </div>

                    <div id="input-local-${id}" class="ctrl-group" style="display:none;">
                        <label>本地视频文件</label>
                        <input type="file" id="file-${id}" accept="video/*">
                    </div>

                    <div class="ctrl-group">
                        <label>配音角色</label>
                        <select id="voice-${id}">
                            <option value="1">标准男声</option>
                            <option value="0">标准女声</option>
                            <option value="3">情感男声(度逍遥)</option>
                            <option value="4">童音(度丫丫)</option>
                        </select>
                    </div>

        function applyTextStyle(txtObj) {
            if (txtObj.contentEl) txtObj.contentEl.innerText = txtObj.text;

        function applyTextPositionFromPct(txtObj) {
            const w = DOM.preview.clientWidth || 1;
            const h = DOM.preview.clientHeight || 1;
            const maxL = Math.max(0, w - txtObj.el.offsetWidth);
            const maxT = Math.max(0, h - txtObj.el.offsetHeight);
            const left = clampNum(txtObj.x_pct * w, 0, maxL);
            const top = clampNum(txtObj.y_pct * h, 0, maxT);
            txtObj.el.style.left = `${left}px`;
            txtObj.el.style.top = `${top}px`;
            txtObj.x_pct = w ? left / w : 0;
            txtObj.y_pct = h ? top / h : 0;
            if (txtObj === activeTextBox) syncActiveTextPositionInputs();
        }

        document.addEventListener('pointermove', (e) => {

            const target = Engine.dragState.box;
            if (!target) return;

            const dx = e.clientX - Engine.dragState.startX;
            const dy = e.clientY - Engine.dragState.startY;
            const maxL = DOM.preview.clientWidth - target.el.offsetWidth;
            const maxT = DOM.preview.clientHeight - target.el.offsetHeight;
            const newL = Math.max(0, Math.min(maxL, Engine.dragState.startL + dx));
            const newT = Math.max(0, Math.min(maxT, Engine.dragState.startT + dy));

            target.el.style.left = `${newL}px`;
            target.el.style.top = `${newT}px`;

            target.x_pct = DOM.preview.clientWidth ? newL / DOM.preview.clientWidth : 0;
            target.y_pct = DOM.preview.clientHeight ? newT / DOM.preview.clientHeight : 0;

        });

        function getPreferredMimeType() {
            if (typeof MediaRecorder === 'undefined') return '';
            const candidates = [
                'video/webm;codecs=vp9,opus',
                'video/webm;codecs=vp8,opus',
                'video/webm;codecs=vp8',
                'video/webm',
                'video/mp4'
            ];
            return candidates.find(type => MediaRecorder.isTypeSupported(type)) || '';
        }

        async function getVideoDuration(url) {
            return new Promise((resolve) => {
                const probe = document.createElement('video');
                let done = false;
                const finalize = (val) => {
                    if (done) return;
                    done = true;
                    probe.removeAttribute('src');
                    probe.load();
                    resolve(val);
                };

                probe.preload = 'metadata';
                probe.crossOrigin = 'anonymous';
                probe.onloadedmetadata = () => {
                    const duration = Number.isFinite(probe.duration) && probe.duration > 0 ? probe.duration : 4;
                    finalize(duration);
                };
                probe.onerror = () => finalize(4);
                probe.src = url;
                setTimeout(() => finalize(4), 7000);
            });
        }

        async function tryDecodeAudioFromUrl(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error('音频请求失败');
            const arr = await res.arrayBuffer();
            return await Engine.audioCtx.decodeAudioData(arr);
        }

        async function getAudioDuration(url) {
            return new Promise((resolve) => {
                const probe = document.createElement('audio');
                let done = false;
                const finalize = (val) => {
                    if (done) return;
                    done = true;
                    probe.removeAttribute('src');
                    probe.load();
                    resolve(val);
                };

                probe.preload = 'metadata';
                probe.crossOrigin = 'anonymous';
                probe.onloadedmetadata = () => {
                    const duration = Number.isFinite(probe.duration) && probe.duration > 0 ? probe.duration : 0;
                    finalize(duration);
                };
                probe.onerror = () => finalize(0);
                probe.src = url;
                setTimeout(() => finalize(0), 7000);
            });
        }

        function buildTtsCandidateUrls(text, voiceId) {
            const baiduUrl = `https://tts.baidu.com/text2audio?tex=${encodeURIComponent(text)}&cuid=web&lan=ZH&ctp=1&pdt=301&vol=9&rate=32&per=${voiceId}`;
            const seVoiceMap = {
                '0': 'Zhiyu',
                '1': 'Yunxi',
                '3': 'Yunjian',
                '4': 'Xiaoxiao'
            };
            const seVoice = seVoiceMap[voiceId] || 'Zhiyu';
            return [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(baiduUrl)}`,
                baiduUrl,
                `https://api.streamelements.com/kappa/v2/speech?voice=${encodeURIComponent(seVoice)}&text=${encodeURIComponent(text)}`
            ];
        }

        async function fetchTTSAsset(text, voiceId) {
            const candidates = buildTtsCandidateUrls(text, voiceId);

            for (const candidate of candidates) {
                try {
                    const audioBuffer = await tryDecodeAudioFromUrl(candidate);
                    return {
                        audioBuffer,
                        audioUrl: candidate,
                        duration: audioBuffer.duration || 0
                    };
                } catch (err) {
                    console.warn('TTS 解码失败:', candidate);
                }
            }

            for (const candidate of candidates) {
                const duration = await getAudioDuration(candidate);
                if (duration > 0) {
                    return {
                        audioBuffer: null,
                        audioUrl: candidate,
                        duration
                    };
                }
            }

            return {
                audioBuffer: null,
                audioUrl: candidates[1] || candidates[0] || null,
                duration: 0
            };
        }

        document.getElementById('generateBtn').onclick = async function () {
            const btn = this;
            btn.disabled = true;
            document.getElementById('playRecordBtn').disabled = true;
            document.getElementById('playRecordBtn').innerText = '第二步: 播放并录制';
            document.getElementById('downloadBtn').disabled = true;
            Engine.scenes = [];
            clearPlaybackState();
            releaseObjectUrls();
            setStatus('资产解析中', 'busy');

            try {
                log('正在初始化引擎并抓取资产...');

                if (!Engine.audioCtx) Engine.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (Engine.audioCtx.state === 'suspended') await Engine.audioCtx.resume();

                const bgmFile = document.getElementById('bgmInput').files[0];
                Engine.bgmBuffer = null;
                if (bgmFile) {
                    log('正在解码全局 BGM...');
                    Engine.bgmBuffer = await Engine.audioCtx.decodeAudioData(await bgmFile.arrayBuffer());
                }

                const sceneCards = [...document.querySelectorAll('.scene-card')];
                if (!sceneCards.length) throw new Error('请至少添加一个场景。');

                for (let idx = 0; idx < sceneCards.length; idx++) {
                    const card = sceneCards[idx];
                    const id = card.dataset.sceneId;
                    log(`正在处理场景 ${idx + 1}/${sceneCards.length}...`);

                    const source = document.getElementById(`source-${id}`).value;
                    const text = document.getElementById(`text-${id}`).value.trim();
                    const voiceId = document.getElementById(`voice-${id}`).value;
                    let videoUrl = null;
                    let audioBuffer = null;
                    let ttsUrl = null;
                    let ttsDuration = 0;

                    if (source === 'pexels') {
                        const key = pexelsInput.value.trim();
                        if (!key) throw new Error('请先填写 Pexels API Key。');
                        const kw = document.getElementById(`keyword-${id}`).value.trim();
                        if (!kw) throw new Error(`场景 ${idx + 1} 请选择关键词。`);

                        const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(kw)}&per_page=5`, {
                            headers: { Authorization: key }
                        });

                        if (!res.ok) throw new Error(`场景 ${idx + 1} 的 Pexels 请求失败 (${res.status})。`);
                        const data = await res.json();

                        if (!data.videos || !data.videos.length) {
                            throw new Error(`场景 ${idx + 1} 未找到关键词 '${kw}' 相关视频。`);
                        }

                        const files = data.videos[0].video_files || [];
                        const picked = files.sort((a, b) => (b.width * b.height) - (a.width * a.height))[0];
                        if (!picked || !picked.link) throw new Error(`场景 ${idx + 1} 视频地址无效。`);
                        videoUrl = picked.link;
                    } else {
                        const file = document.getElementById(`file-${id}`).files[0];
                        if (!file) throw new Error(`请为场景 ${idx + 1} 上传本地视频。`);
                        videoUrl = URL.createObjectURL(file);
                        Engine.objectUrls.push(videoUrl);
                    }

                    if (text) {
                        const ttsAsset = await fetchTTSAsset(text, voiceId);
                        audioBuffer = ttsAsset.audioBuffer;
                        ttsUrl = ttsAsset.audioUrl;
                        ttsDuration = ttsAsset.duration || 0;
                        if (!audioBuffer && !ttsUrl) {
                            log(`场景 ${idx + 1} 配音获取失败，将仅使用视频原声。`, 'error');
                        }
                    }

                    const videoDuration = await getVideoDuration(videoUrl);
                    const duration = ttsDuration || videoDuration;

                    Engine.scenes.push({
                        id,
                        videoUrl,
                        text,
                        audioBuffer,
                        ttsUrl,
                        duration: Math.max(1, duration || 4)
                    });
                }

                log('资产解析完成，可以开始录制。', 'success');
                setStatus('资产就绪', 'ok');
                document.getElementById('playRecordBtn').disabled = false;
            } catch (err) {
                console.error(err);
                log(`解析失败: ${err.message}`, 'error');
                setStatus('解析失败', 'error');
                alert(err.message || '资产解析失败，请检查输入后重试。');
            } finally {
                btn.disabled = false;
            }
        };

        document.getElementById('playRecordBtn').onclick = async function () {
            if (!Engine.scenes.length) {
                alert('请先执行第一步解析场景资产。');
                return;
            }
            if (typeof MediaRecorder === 'undefined') {
                alert('当前浏览器不支持 MediaRecorder，无法进行录制下载。');
                return;
            }

            if (!Engine.audioCtx) Engine.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (Engine.audioCtx.state === 'suspended') await Engine.audioCtx.resume();

            log('启动混流渲染管线...');
            setStatus('录制中', 'busy');
            this.disabled = true;
            this.innerText = '录制中...';
            document.getElementById('downloadBtn').disabled = true;

            Engine.isPlaying = true;
            Engine.currentIdx = 0;
            Engine.recordedChunks = [];

            const [w, h] = document.getElementById('videoSize').value.split(',').map(Number);
            DOM.canvas.width = w;
            DOM.canvas.height = h;

            clearPlaybackState();

            const dest = Engine.audioCtx.createMediaStreamDestination();
            let bgmSrc = null;
            try {
                if (Engine.bgmBuffer) {
                    bgmSrc = Engine.audioCtx.createBufferSource();
                    bgmSrc.buffer = Engine.bgmBuffer;
                    bgmSrc.loop = true;
                    const gain = Engine.audioCtx.createGain();
                    gain.gain.value = parseFloat(document.getElementById('bgmVolume').value);
                    bgmSrc.connect(gain).connect(dest);
                    gain.connect(Engine.audioCtx.destination);
                    bgmSrc.start(0);
                }

                const vStream = DOM.canvas.captureStream(30);
                const mixStream = new MediaStream([...vStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
                const mimeType = getPreferredMimeType();
                Engine.mediaRecorder = mimeType ? new MediaRecorder(mixStream, { mimeType }) : new MediaRecorder(mixStream);
            } catch (err) {
                console.error(err);
                if (bgmSrc) {
                    try { bgmSrc.stop(); } catch (e) {}
                }
                Engine.isPlaying = false;
                this.disabled = false;
                this.innerText = '第二步: 播放并录制';
                setStatus('录制失败', 'error');
                log(`录制器初始化失败: ${err.message || err}`, 'error');
                return;
            }

            Engine.mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) Engine.recordedChunks.push(e.data);
            };
            Engine.mediaRecorder.onerror = (e) => {
                console.error('MediaRecorder 错误:', e);
                log('录制器发生错误，正在停止录制。', 'error');
                setStatus('录制失败', 'error');
                if (Engine.mediaRecorder && Engine.mediaRecorder.state !== 'inactive') {
                    try { Engine.mediaRecorder.stop(); } catch (stopErr) {}
                }
            };

            Engine.mediaRecorder.onstop = () => {
                clearPlaybackState();
                Engine.isPlaying = false;
                cancelAnimationFrame(Engine.animFrame);
                DOM.player.pause();
                DOM.player.removeAttribute('src');
                DOM.player.load();
                DOM.player.style.display = 'none';
                DOM.subtitle.innerText = '';

                if (bgmSrc) {
                    try { bgmSrc.stop(); } catch (e) {}
                }

                this.disabled = false;
                this.innerText = '重新录制';
                document.getElementById('downloadBtn').disabled = false;
                if (Engine.recordedChunks.length > 0) {
                    log('视频录制结束，点击下载保存。', 'success');
                    setStatus('录制完成', 'ok');
                } else {
                    log('录制结束但未生成可下载数据，请重试。', 'error');
                    setStatus('录制无数据', 'error');
                }
            };

            try {
                Engine.mediaRecorder.start(400);
            } catch (err) {
                console.error(err);
                if (bgmSrc) {
                    try { bgmSrc.stop(); } catch (e) {}
                }
                this.disabled = false;
                this.innerText = '第二步: 播放并录制';
                Engine.isPlaying = false;
                setStatus('录制失败', 'error');
                log(`录制启动失败: ${err.message || err}`, 'error');
                return;
            }
            playNextScene(dest);
            renderLoop();
        };

        function playNextScene(dest) {
            if (!Engine.isPlaying) return;

            if (Engine.currentIdx >= Engine.scenes.length) {
                Engine.isPlaying = false;
                if (Engine.mediaRecorder && Engine.mediaRecorder.state !== 'inactive') {
                    Engine.mediaRecorder.stop();
                }
                return;
            }

            clearPlaybackState();
            const scene = Engine.scenes[Engine.currentIdx];
            log(`正在渲染场景 ${Engine.currentIdx + 1}/${Engine.scenes.length}...`);

            DOM.player.style.display = 'block';
            DOM.player.src = scene.videoUrl;
            DOM.subtitle.innerText = scene.text || '';
            applySubtitlePreviewStyle();

            let advanced = false;
            const advance = () => {
                if (advanced) return;
                advanced = true;
                Engine.currentIdx += 1;
                playNextScene(dest);
            };
            const loadWatchdog = setTimeout(() => {
                log(`场景 ${Engine.currentIdx + 1} 加载超时，自动跳过。`, 'error');
                advance();
            }, 12000);

            DOM.player.onended = () => {
                clearTimeout(loadWatchdog);
                if (!scene.audioBuffer && !scene.ttsUrl) advance();
            };
            DOM.player.onerror = () => {
                clearTimeout(loadWatchdog);
                log(`场景 ${Engine.currentIdx + 1} 视频加载失败，自动跳过。`, 'error');
                advance();
            };

            DOM.player.oncanplay = async () => {
                clearTimeout(loadWatchdog);
                try { await DOM.player.play(); } catch (e) {}

                if (scene.audioBuffer) {
                    const voice = Engine.audioCtx.createBufferSource();
                    voice.buffer = scene.audioBuffer;
                    voice.connect(dest);
                    voice.connect(Engine.audioCtx.destination);
                    Engine.activeVoice = voice;

                    voice.onended = advance;
                    voice.start(0);

                    Engine.sceneTimer = setTimeout(advance, (scene.duration + 0.15) * 1000);
                } else if (scene.ttsUrl) {
                    const voiceEl = new Audio(scene.ttsUrl);
                    voiceEl.preload = 'auto';
                    voiceEl.crossOrigin = 'anonymous';
                    voiceEl.playsInline = true;

                    try {
                        const voiceNode = Engine.audioCtx.createMediaElementSource(voiceEl);
                        voiceNode.connect(dest);
                        voiceNode.connect(Engine.audioCtx.destination);
                        Engine.activeVoiceNode = voiceNode;
                    } catch (err) {
                        console.warn('TTS 媒体节点创建失败，将直接播放音频。', err);
                    }

                    Engine.activeVoiceEl = voiceEl;
                    voiceEl.onended = advance;
                    voiceEl.onerror = () => {
                        log(`场景 ${Engine.currentIdx + 1} 配音播放失败，已跳过。`, 'error');
                        advance();
                    };

                    try {
                        await voiceEl.play();
                    } catch (err) {
                        log(`场景 ${Engine.currentIdx + 1} 配音播放失败，已跳过。`, 'error');
                        advance();
                        return;
                    }
                    Engine.sceneTimer = setTimeout(advance, (scene.duration + 0.2) * 1000);
                } else {
                    Engine.sceneTimer = setTimeout(advance, scene.duration * 1000);
                }
            };
        }

        function splitTextLines(ctx, text, maxWidth, maxLines) {
            const chars = [...text];
            const lines = [];
            let line = '';

            chars.forEach((ch) => {
                const test = line + ch;
                if (ctx.measureText(test).width > maxWidth && line) {
                    lines.push(line);
                    line = ch;
                } else {
                    line = test;
                }
            });

            if (line) lines.push(line);
            if (lines.length <= maxLines) return lines;

            const trimmed = lines.slice(0, maxLines);
            const last = trimmed[maxLines - 1];
            trimmed[maxLines - 1] = `${last.slice(0, Math.max(1, last.length - 1))}…`;
            return trimmed;
        }

        function renderLoop() {
            if (!Engine.isPlaying) return;

            const ctx = DOM.ctx;
            const w = DOM.canvas.width;
            const h = DOM.canvas.height;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);

            if (DOM.player.readyState >= 2) {
                const vw = DOM.player.videoWidth;
                const vh = DOM.player.videoHeight;
                if (vw && vh) {
                    const scale = Math.max(w / vw, h / vh);
                    const dw = vw * scale;
                    const dh = vh * scale;
                    ctx.drawImage(DOM.player, (w - dw) / 2, (h - dh) / 2, dw, dh);
                }
            }

            if (DOM.subtitle.innerText) {
                const fontFamily = document.getElementById('fontFamily').value;
                const fontSize = Math.max(18, Number(document.getElementById('fontSize').value) || 55);
                ctx.font = `700 ${fontSize}px ${fontFamily}`;

                const lines = splitTextLines(ctx, DOM.subtitle.innerText, w * 0.85, 3);
                const lineHeight = fontSize + 12;
                const boxHeight = lines.length * lineHeight + 24;
                const maxLineWidth = Math.max(...lines.map(line => ctx.measureText(line).width), 100);
                const boxWidth = Math.min(w * 0.92, maxLineWidth + 44);
                const boxX = (w - boxWidth) / 2;
                const boxY = h * 0.89 - boxHeight;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.46)';
                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);

                ctx.fillStyle = document.getElementById('fontColor').value;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 9;

                lines.forEach((line, i) => {
                    ctx.fillText(line, w / 2, boxY + 12 + i * lineHeight);
                });

                ctx.shadowBlur = 0;
            }

            const previewH = DOM.preview.clientHeight || h;
            const textScale = h / previewH;
            const textFont = document.getElementById('fontFamily').value;

            Engine.textBoxes.forEach((txt) => {
                const renderSize = Math.max(12, txt.size * textScale);
                ctx.font = `700 ${renderSize}px ${textFont}`;
                ctx.fillStyle = txt.color;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.shadowColor = 'rgba(0,0,0,0.85)';
                ctx.shadowBlur = 6;
                ctx.fillText(txt.text, txt.x_pct * w, txt.y_pct * h);
                ctx.shadowBlur = 0;
            });

            Engine.animFrame = requestAnimationFrame(renderLoop);
        }

        document.getElementById('downloadBtn').onclick = () => {
            if (!Engine.recordedChunks.length) {
                alert('暂无可下载的视频，请先录制。');
                return;
            }

            const outputType = Engine.recordedChunks[0] && Engine.recordedChunks[0].type
                ? Engine.recordedChunks[0].type
                : 'video/webm';
            const ext = outputType.includes('mp4') ? 'mp4' : 'webm';
            const blob = new Blob(Engine.recordedChunks, { type: outputType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `AI全能矩阵视频_${Date.now()}.${ext}`;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1500);
            log('下载已触发。', 'success');
        };

        window.addEventListener('resize', () => {
            updatePreviewFrameSize();
            repositionTextBoxes();
        });
        applySubtitlePreviewStyle();
        syncTextInspector();
        updateSceneCounter();
        updatePreviewRatio();
    </script>
</body>
</html>
