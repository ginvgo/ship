<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能 AI 视频合成工作站 (Pexels + 拖拽文本 + 混流引擎)</title>
    <style>
        :root {
            --bg: #0a0615;
            --bg-soft: #140b2a;
            --panel: rgba(19, 12, 36, 0.84);
            --panel-border: rgba(129, 75, 255, 0.34);
            --panel-hover: rgba(146, 95, 255, 0.5);
            --text: #ece8ff;
            --text-soft: #b9afd6;
            --primary: #8b35ff;
            --primary-strong: #a44bff;
            --accent: #18d9c7;
            --danger: #ff4f8b;
            --success: #2fd487;
            --shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
            --grid-gap: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Rajdhani", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(1200px 600px at 15% -15%, rgba(168, 64, 255, 0.18), transparent 55%),
                radial-gradient(1000px 700px at 100% 10%, rgba(24, 217, 199, 0.12), transparent 48%),
                linear-gradient(145deg, #090512 0%, #0d0720 46%, #090512 100%);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .studio-topbar {
            height: 62px;
            padding: 10px 18px;
            border-bottom: 1px solid rgba(128, 70, 255, 0.28);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(12, 7, 24, 0.88);
            backdrop-filter: blur(8px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.4px;
        }

        .brand-badge {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            background: linear-gradient(135deg, #7e34ff, #bb3fff);
            box-shadow: 0 0 16px rgba(156, 64, 255, 0.58);
            display: grid;
            place-items: center;
            font-weight: 700;
            color: #fff;
        }

        .brand h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .brand small {
            color: var(--text-soft);
            font-size: 13px;
            margin-left: 8px;
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-soft);
            font-size: 13px;
        }

        .status-pill {
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid rgba(83, 215, 168, 0.45);
            color: #8fffd4;
            background: rgba(14, 57, 48, 0.42);
        }

        .app-grid {
            flex: 1;
            min-height: 0;
            padding: var(--grid-gap);
            display: grid;
            grid-template-columns: 320px minmax(360px, 1fr) minmax(520px, 40vw);
            gap: var(--grid-gap);
            overflow: visible;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 14px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            min-height: 0;
        }

        .panel:hover {
            border-color: var(--panel-hover);
        }

        h2,
        h3 {
            margin: 0;
            font-size: 15px;
            letter-spacing: 0.4px;
            color: #fff;
            border-bottom: 1px solid rgba(102, 64, 188, 0.5);
            padding-bottom: 9px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .panel-headline {
            align-items: flex-start;
        }

        .panel-title-wrap {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .panel-subtitle {
            font-size: 11px;
            color: #aa98d6;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .ctrl-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 12px;
            color: var(--text-soft);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row > .ctrl-group,
        .row > div {
            flex: 1;
        }

        input,
        select,
        textarea {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(111, 79, 196, 0.66);
            background: rgba(9, 6, 19, 0.93);
            color: #f3f1ff;
            padding: 9px 10px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(164, 78, 255, 0.95);
            box-shadow: 0 0 0 2px rgba(139, 53, 255, 0.22);
        }

        textarea {
            resize: vertical;
            min-height: 58px;
        }

        input[type="color"] {
            padding: 3px;
            height: 38px;
        }

        .hex-input {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            text-transform: lowercase;
        }

        .color-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .color-preset-btn {
            width: 24px;
            height: 24px;
            border-radius: 7px;
            border: 1px solid rgba(255, 255, 255, 0.42);
            padding: 0;
            min-width: 24px;
            min-height: 24px;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.3);
        }

        .color-preset-btn:hover:not(:disabled) {
            transform: translateY(-1px) scale(1.03);
        }

        button {
            border: none;
            border-radius: 9px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s, opacity 0.15s;
            background: linear-gradient(135deg, #6728dd, #8f34ff);
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn-green {
            background: linear-gradient(135deg, #08b99b, #11d48b);
        }

        .btn-red {
            background: linear-gradient(135deg, #e53f7f, #ff5d66);
        }

        .scene-card {
            background: linear-gradient(170deg, rgba(38, 21, 73, 0.92), rgba(23, 14, 45, 0.93));
            border: 1px solid rgba(130, 86, 214, 0.48);
            border-left: 3px solid var(--primary);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: cardIn 0.24s ease;
        }

        .scene-meta-grid {
            display: grid;
            grid-template-columns: 1.25fr 1fr;
            gap: 10px;
        }

        .duration-input-wrap {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .duration-input-wrap input {
            flex: 1 1 auto;
            min-width: 0;
        }

        .chip-btn {
            flex: 0 0 auto;
            border-radius: 999px;
            border: 1px solid rgba(145, 105, 236, 0.58);
            padding: 7px 11px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(75, 39, 151, 0.55);
            color: #e7d6ff;
            cursor: pointer;
        }

        .chip-btn:hover {
            filter: brightness(1.12);
        }

        .duration-hint {
            font-size: 11px;
            color: #8f83b5;
        }

        .bgm-library {
            border: 1px solid rgba(107, 70, 199, 0.5);
            border-radius: 10px;
            background: rgba(13, 8, 26, 0.76);
            padding: 9px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bgm-actions {
            display: flex;
            gap: 8px;
        }

        .bgm-actions button {
            padding: 7px 10px;
            font-size: 12px;
        }

        .bgm-list {
            min-height: 112px;
            max-height: 170px;
            font-size: 12px;
        }

        .bgm-hint {
            font-size: 11px;
            color: #9183bc;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scene-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #c9b3ff;
            font-weight: 700;
            font-size: 14px;
        }

        .scene-remove {
            background: transparent;
            border: 1px solid rgba(255, 102, 162, 0.5);
            color: #ff8bb6;
            padding: 3px 8px;
            border-radius: 7px;
            font-size: 12px;
        }

        .workspace {
            flex: 0 0 clamp(360px, 68vh, 900px);
            min-height: 360px;
            max-height: 900px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background:
                radial-gradient(500px 240px at 70% 10%, rgba(132, 49, 255, 0.14), transparent 60%),
                #05070f;
            border: 1px solid rgba(99, 64, 184, 0.62);
            overflow: auto;
            padding: 10px;
        }

        .preview-box {
            position: relative;
            width: 100%;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16/9;
            border-radius: 10px;
            background: #0f1222;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: inset 0 0 0 1px rgba(143, 88, 255, 0.28), 0 16px 40px rgba(1, 0, 5, 0.6);
        }

        .preview-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #textLayer {
            position: absolute;
            inset: 0;
            z-index: 20;
        }

        #mainSubtitle {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.75);
            z-index: 10;
            pointer-events: none;
        }

        .draggable-text {
            position: absolute;
            cursor: grab;
            user-select: none;
            white-space: nowrap;
            padding: 4px 12px 10px 6px;
            border: 1px dashed transparent;
            border-radius: 6px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-weight: 700;
            touch-action: none;
            transition: border-color 0.12s, background 0.12s;
        }

        .draggable-text-content {
            pointer-events: none;
        }

        .text-resize-handle {
            position: absolute;
            right: 2px;
            bottom: 2px;
            width: 9px;
            height: 9px;
            border-right: 2px solid rgba(230, 220, 255, 0.9);
            border-bottom: 2px solid rgba(230, 220, 255, 0.9);
            border-radius: 1px;
            cursor: nwse-resize;
            opacity: 0.85;
            touch-action: none;
        }

        .draggable-text.active .text-resize-handle {
            border-right-color: #be92ff;
            border-bottom-color: #be92ff;
        }

        .draggable-text:hover {
            border-color: rgba(219, 196, 255, 0.75);
        }

        .draggable-text.active {
            border-color: #9a57ff;
            background: rgba(134, 58, 255, 0.25);
        }

        .toolbar-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-row {
            display: flex;
            gap: 10px;
        }

        .status-log {
            font-size: 12px;
            text-align: center;
            color: #a6f2d2;
            border-top: 1px solid rgba(108, 72, 199, 0.48);
            padding-top: 8px;
            min-height: 20px;
        }

        .text-inspector {
            border: 1px solid rgba(107, 70, 199, 0.55);
            border-radius: 10px;
            padding: 10px;
            background: rgba(12, 7, 24, 0.66);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .inspector-title {
            font-size: 12px;
            font-weight: 700;
            color: #d8c9ff;
        }

        #scenesContainer {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            padding-right: 3px;
        }

        .timeline-overview {
            margin-top: 4px;
            border: 1px solid rgba(99, 64, 184, 0.48);
            border-radius: 11px;
            padding: 10px;
            background: linear-gradient(180deg, rgba(16, 10, 33, 0.92), rgba(10, 8, 24, 0.88));
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .timeline-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #d8c9ff;
            font-weight: 700;
        }

        .timeline-track {
            display: flex;
            gap: 6px;
            min-height: 32px;
            border: 1px dashed rgba(131, 95, 220, 0.42);
            border-radius: 9px;
            padding: 6px;
            background: rgba(12, 8, 26, 0.8);
            overflow-x: auto;
            overflow-y: hidden;
        }

        .timeline-segment {
            min-width: 44px;
            border-radius: 6px;
            background: linear-gradient(135deg, rgba(115, 47, 233, 0.78), rgba(67, 34, 149, 0.76));
            border: 1px solid rgba(189, 153, 255, 0.35);
            display: grid;
            place-items: center;
            font-size: 11px;
            color: #f0e6ff;
            white-space: nowrap;
            padding: 0 8px;
        }

        .timeline-empty {
            width: 100%;
            display: grid;
            place-items: center;
            color: #7f71a8;
            font-size: 11px;
        }

        .timeline-tips {
            font-size: 11px;
            color: #9183bc;
        }

        canvas {
            display: none;
        }

        @media (max-width: 1300px) {
            .app-grid {
                grid-template-columns: 300px 1fr;
                grid-template-areas:
                    "left right"
                    "middle right";
            }

            .workspace {
                flex-basis: clamp(320px, 62vh, 760px);
                min-height: 320px;
                max-height: 760px;
            }

            .left-panel { grid-area: left; }
            .middle-panel { grid-area: middle; }
            .right-panel { grid-area: right; }
        }

        @media (max-width: 980px) {
            body {
                overflow: auto;
            }

            .studio-topbar {
                flex-wrap: wrap;
                height: auto;
                gap: 8px;
            }

            .app-grid {
                height: auto;
                min-height: auto;
                grid-template-columns: 1fr;
                grid-template-areas: none;
                overflow: visible;
            }

            .panel {
                overflow: visible;
            }

            .workspace {
                min-height: 220px;
            }

            .scene-meta-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="studio-topbar">
        <div class="brand">
            <div class="brand-badge">AI</div>
            <div>
                <h1>AI Studio</h1>
                <small>全能视频合成工作站</small>
            </div>
        </div>
        <div class="top-right">
            <span id="sceneCounter">场景: 1</span>
            <span class="status-pill">状态: 待命</span>
        </div>
    </header>

    <div class="app-grid">
        <div class="panel left-panel">
            <h2>全局设置 & API</h2>

            <div class="ctrl-group">
                <label style="color:var(--accent)">Pexels API Key (必填)</label>
                <input type="text" id="pexelsKey" placeholder="在此粘贴 Pexels API Key..." onchange="saveKey()">
            </div>

            <div class="ctrl-group">
                <label>视频导出尺寸</label>
                <select id="videoSize" onchange="updatePreviewRatio()">
                    <option value="1920,1080">16:9 高清横屏 (1920x1080)</option>
                    <option value="1080,1920">9:16 高清竖屏 (1080x1920)</option>
                    <option value="1080,1080">1:1 正方形 (1080x1080)</option>
                    <option value="1200,900">4:3 传统横屏 (1200x900)</option>
                    <option value="1080,1350">4:5 社交竖屏 (1080x1350)</option>
                </select>
            </div>

            <div class="ctrl-group">
                <label>背景音乐库 (可多选)</label>
                <input type="file" id="bgmInput" accept="audio/mp3,audio/wav,audio/mpeg,audio/*" multiple>
                <div class="bgm-library">
                    <select id="bgmLibraryList" class="bgm-list" multiple></select>
                    <div class="bgm-actions">
                        <button type="button" id="removeBgmBtn" class="btn-red">移除所选</button>
                        <button type="button" id="clearBgmBtn">清空音乐库</button>
                    </div>
                    <div class="bgm-hint">从列表中按住 Ctrl/Command 可多选，录制时会混合播放。</div>
                </div>
                <label>音量调节: <span id="bgmVolVal">15%</span></label>
                <input type="range" id="bgmVolume" min="0" max="1" step="0.05" value="0.15" oninput="document.getElementById('bgmVolVal').innerText = Math.round(this.value*100)+'%'">
            </div>

            <h2>主字幕样式 (底部旁白)</h2>
            <div class="ctrl-group">
                <label>字体库</label>
                <select id="fontFamily">
                    <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
                    <option value="SimHei, sans-serif">黑体</option>
                    <option value="KaiTi, serif">楷体</option>
                </select>
            </div>
            <div class="row">
                <div class="ctrl-group">
                    <label>字号大小</label>
                    <input type="number" id="fontSize" value="55" min="16" max="150">
                </div>
                <div class="ctrl-group">
                    <label>字体颜色</label>
                    <input type="color" id="fontColor" value="#ffffff">
                </div>
            </div>
            <div class="ctrl-group">
                <label>字体 HEX 颜色值</label>
                <input type="text" id="fontColorHex" class="hex-input" value="#ffffff" placeholder="#RRGGBB">
            </div>
            <div class="ctrl-group">
                <label>常用字幕颜色</label>
                <div id="fontColorPresetBar" class="color-presets"></div>
            </div>
            <div class="ctrl-group">
                <label>字幕样式预设</label>
                <select id="subtitleStylePreset">
                    <option value="classic">经典白字</option>
                    <option value="film">电影黄字</option>
                    <option value="neon">霓虹青字</option>
                    <option value="warning">警示红字</option>
                </select>
            </div>
        </div>

        <div class="panel middle-panel">
            <h2 class="panel-headline">
                <div class="panel-title-wrap">
                    <span>场景编排轨道</span>
                    <span class="panel-subtitle" id="sceneDurationSummary">总时长预估: 00:00</span>
                </div>
                <button onclick="addScene()" class="btn-green" style="padding:6px 10px;">+ 添加场景</button>
            </h2>
            <div id="scenesContainer"></div>
            <div class="timeline-overview">
                <div class="timeline-head">
                    <span>时间轴预览</span>
                    <span id="timelineTotal">00:00</span>
                </div>
                <div id="timelineTrack" class="timeline-track"></div>
                <div class="timeline-tips">填入场景秒数可强制时长；设为 0 则自动按配音/视频时长。</div>
            </div>
        </div>

        <div class="panel right-panel">
            <h2>
                可视化监视器
                <div style="display:flex; gap:6px;">
                    <button onclick="addTextBox()" style="padding:6px 10px;">+ 自由文本</button>
                    <button onclick="deleteActiveTextBox()" class="btn-red" style="padding:6px 10px;">删文本</button>
                </div>
            </h2>

            <div class="workspace">
                <div class="preview-box" id="previewBox" style="aspect-ratio: 16/9;">
                    <video id="mediaPlayer" class="preview-media" muted playsinline></video>
                    <div id="mainSubtitle"></div>
                    <div id="textLayer"></div>
                </div>
            </div>

            <div class="text-inspector">
                <div class="inspector-title">自由文本属性 (选中后可编辑)</div>
                <div class="ctrl-group">
                    <label>内容</label>
                    <input id="textEditContent" type="text" placeholder="先在预览区点击一个文本" disabled>
                </div>
                <div class="row">
                    <div class="ctrl-group">
                        <label>颜色</label>
                        <input id="textEditColor" type="color" value="#ffffff" disabled>
                    </div>
                    <div class="ctrl-group">
                        <label>字号</label>
                        <input id="textEditSize" type="number" value="24" min="12" max="300" disabled>
                    </div>
                </div>
                <div class="ctrl-group">
                    <label>HEX 颜色值</label>
                    <input id="textEditHex" class="hex-input" type="text" value="#ffffff" placeholder="#RRGGBB" disabled>
                </div>
                <div class="ctrl-group">
                    <label>常用文字颜色</label>
                    <div id="textColorPresetBar" class="color-presets"></div>
                </div>
                <div class="ctrl-group">
                    <label>文字样式预设</label>
                    <select id="textStylePreset" disabled>
                        <option value="custom">自定义</option>
                        <option value="title">标题白字</option>
                        <option value="gold">电商金字</option>
                        <option value="neon">科技青字</option>
                        <option value="alert">警示红字</option>
                    </select>
                </div>
                <div class="row">
                    <div class="ctrl-group">
                        <label>X (%)</label>
                        <input id="textEditX" type="number" value="30" min="0" max="100" step="0.1" disabled>
                    </div>
                    <div class="ctrl-group">
                        <label>Y (%)</label>
                        <input id="textEditY" type="number" value="30" min="0" max="100" step="0.1" disabled>
                    </div>
                </div>
            </div>

            <div class="toolbar-row">
                <button id="generateBtn" class="btn-green" style="height:42px;">第一步: 解析场景资产 (获取视频/配音)</button>
                <div class="action-row">
                    <button id="playRecordBtn" class="btn-red" style="flex:1; height:42px;" disabled>第二步: 播放并录制</button>
                    <button id="downloadBtn" style="flex:1; height:42px;" disabled>第三步: 下载合并视频</button>
                </div>
                <div class="action-row">
                    <button id="downloadScenesBtn" style="flex:1; height:42px;" disabled>下载每个场景视频</button>
                </div>
                <div id="statusLog" class="status-log">等待操作...</div>
            </div>
        </div>
    </div>

    <canvas id="renderCanvas" width="1920" height="1080"></canvas>

    <script>
        const pexelsInput = document.getElementById('pexelsKey');
        if (localStorage.getItem('pexels_key')) pexelsInput.value = localStorage.getItem('pexels_key');
        function saveKey() { localStorage.setItem('pexels_key', pexelsInput.value.trim()); }

        function clampNum(value, min, max) {
            if (!Number.isFinite(value)) return min;
            return Math.min(max, Math.max(min, value));
        }

        function formatPct(value) {
            return (Math.round(value * 10) / 10).toString();
        }

        function normalizeHexColor(raw) {
            if (!raw) return null;
            let hex = raw.trim().replace(/^#/, '');
            if (/^[0-9a-fA-F]{3}$/.test(hex)) {
                hex = hex.split('').map(ch => ch + ch).join('');
            }
            if (!/^[0-9a-fA-F]{6}$/.test(hex)) return null;
            return `#${hex.toLowerCase()}`;
        }

        function isRemoteHttpUrl(url) {
            return /^https?:\/\//i.test(String(url || ''));
        }

        function updatePreviewFrameSize() {
            if (!DOM.workspace || !DOM.preview) return;
            const [w, h] = document.getElementById('videoSize').value.split(',').map(Number);
            const ratio = w / h;
            const maxW = Math.max(120, DOM.workspace.clientWidth - 20);
            const maxH = Math.max(120, DOM.workspace.clientHeight - 20);

            let targetW = maxW;
            let targetH = targetW / ratio;
            if (targetH > maxH) {
                targetH = maxH;
                targetW = targetH * ratio;
            }

            DOM.preview.style.width = `${Math.floor(targetW)}px`;
            DOM.preview.style.height = `${Math.floor(targetH)}px`;
        }

        function updatePreviewRatio() {
            const [w, h] = document.getElementById('videoSize').value.split(',').map(Number);
            document.getElementById('previewBox').style.aspectRatio = `${w} / ${h}`;
            updatePreviewFrameSize();
            repositionTextBoxes();
        }

        let sceneCount = 0;
        let activeTextBox = null;

        const Engine = {
            scenes: [],
            textBoxes: [],
            audioCtx: null,
            bgmLibrary: [],
            bgmBuffers: [],
            isPlaying: false,
            isBatchExporting: false,
            currentIdx: 0,
            mediaRecorder: null,
            recordedChunks: [],
            mergedBlob: null,
            animFrame: null,
            activeVoice: null,
            activeVoiceEl: null,
            activeVoiceNode: null,
            activeBgmSources: [],
            sceneTimer: null,
            objectUrls: [],
            subtitleStyleKey: 'classic',
            dragState: { box: null, startX: 0, startY: 0, startL: 0, startT: 0 },
            resizeState: { box: null, startX: 0, startY: 0, startSize: 24 }
        };

        const DOM = {
            log: document.getElementById('statusLog'),
            canvas: document.getElementById('renderCanvas'),
            ctx: document.getElementById('renderCanvas').getContext('2d'),
            player: document.getElementById('mediaPlayer'),
            subtitle: document.getElementById('mainSubtitle'),
            preview: document.getElementById('previewBox'),
            workspace: document.querySelector('.workspace'),
            textLayer: document.getElementById('textLayer'),
            sceneCounter: document.getElementById('sceneCounter'),
            statusPill: document.querySelector('.status-pill'),
            bgmInput: document.getElementById('bgmInput'),
            bgmLibraryList: document.getElementById('bgmLibraryList'),
            removeBgmBtn: document.getElementById('removeBgmBtn'),
            clearBgmBtn: document.getElementById('clearBgmBtn'),
            bgmVolume: document.getElementById('bgmVolume'),
            textEditContent: document.getElementById('textEditContent'),
            textEditColor: document.getElementById('textEditColor'),
            textEditSize: document.getElementById('textEditSize'),
            textEditHex: document.getElementById('textEditHex'),
            textStylePreset: document.getElementById('textStylePreset'),
            textColorPresetBar: document.getElementById('textColorPresetBar'),
            textEditX: document.getElementById('textEditX'),
            textEditY: document.getElementById('textEditY'),
            fontColor: document.getElementById('fontColor'),
            fontColorHex: document.getElementById('fontColorHex'),
            fontColorPresetBar: document.getElementById('fontColorPresetBar'),
            subtitleStylePreset: document.getElementById('subtitleStylePreset'),
            sceneDurationSummary: document.getElementById('sceneDurationSummary'),
            timelineTrack: document.getElementById('timelineTrack'),
            timelineTotal: document.getElementById('timelineTotal'),
            generateBtn: document.getElementById('generateBtn'),
            playRecordBtn: document.getElementById('playRecordBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            downloadScenesBtn: document.getElementById('downloadScenesBtn')
        };

        const COMMON_COLOR_PRESETS = [
            '#ffffff', '#f8e36a', '#00f5ff', '#ffd1dc', '#ff6f61',
            '#7cff8f', '#6da8ff', '#ff8a00', '#e9d5ff', '#121212'
        ];

        const SUBTITLE_STYLE_PRESETS = {
            classic: {
                boxColor: 'rgba(0, 0, 0, 0.46)',
                shadowColor: 'rgba(0, 0, 0, 0.8)',
                shadowBlur: 9,
                strokeColor: 'rgba(0, 0, 0, 0.72)',
                strokeWidth: 3,
                color: '#ffffff'
            },
            film: {
                boxColor: 'rgba(18, 14, 4, 0.54)',
                shadowColor: 'rgba(0, 0, 0, 0.88)',
                shadowBlur: 11,
                strokeColor: 'rgba(32, 20, 0, 0.9)',
                strokeWidth: 3.2,
                color: '#f8e36a'
            },
            neon: {
                boxColor: 'rgba(0, 18, 22, 0.56)',
                shadowColor: 'rgba(0, 245, 255, 0.55)',
                shadowBlur: 13,
                strokeColor: 'rgba(0, 0, 0, 0.78)',
                strokeWidth: 2.8,
                color: '#00f5ff'
            },
            warning: {
                boxColor: 'rgba(32, 0, 0, 0.56)',
                shadowColor: 'rgba(255, 70, 70, 0.56)',
                shadowBlur: 12,
                strokeColor: 'rgba(34, 0, 0, 0.92)',
                strokeWidth: 3.2,
                color: '#ff6f61'
            }
        };

        const TEXT_STYLE_PRESETS = {
            title: { color: '#ffffff', size: 54 },
            gold: { color: '#f8e36a', size: 48 },
            neon: { color: '#00f5ff', size: 46 },
            alert: { color: '#ff6f61', size: 50 }
        };

        function log(msg, level = 'info') {
            DOM.log.innerText = `> ${msg}`;
            const color = level === 'error' ? '#ff9dc1' : level === 'success' ? '#93ffd5' : '#b8f5dc';
            DOM.log.style.color = color;
        }

        function setStatus(label, mode = 'idle') {
            DOM.statusPill.innerText = `状态: ${label}`;
            if (mode === 'busy') {
                DOM.statusPill.style.borderColor = 'rgba(255, 165, 79, 0.55)';
                DOM.statusPill.style.background = 'rgba(76, 43, 8, 0.42)';
                DOM.statusPill.style.color = '#ffc894';
            } else if (mode === 'ok') {
                DOM.statusPill.style.borderColor = 'rgba(83, 215, 168, 0.45)';
                DOM.statusPill.style.background = 'rgba(14, 57, 48, 0.42)';
                DOM.statusPill.style.color = '#8fffd4';
            } else if (mode === 'error') {
                DOM.statusPill.style.borderColor = 'rgba(255, 110, 148, 0.55)';
                DOM.statusPill.style.background = 'rgba(69, 18, 37, 0.42)';
                DOM.statusPill.style.color = '#ff98bc';
            } else {
                DOM.statusPill.style.borderColor = 'rgba(165, 138, 237, 0.5)';
                DOM.statusPill.style.background = 'rgba(25, 18, 48, 0.52)';
                DOM.statusPill.style.color = '#d8c9ff';
            }
        }

        function formatDurationClock(seconds) {
            const safe = Math.max(0, Math.floor(Number(seconds) || 0));
            const m = Math.floor(safe / 60);
            const s = safe % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function readCustomSceneDuration(id) {
            const input = document.getElementById(`duration-${id}`);
            if (!input) return 0;
            const raw = Number(input.value);
            if (!Number.isFinite(raw) || raw <= 0) return 0;
            return clampNum(raw, 0.5, 600);
        }

        function estimateAutoSceneDuration(id) {
            const text = (document.getElementById(`text-${id}`)?.value || '').trim();
            if (text) {
                return clampNum(text.length / 4, 2, 24);
            }
            return 4;
        }

        function getSceneTimelineMeta(card) {
            const id = card.dataset.sceneId;
            const customDuration = readCustomSceneDuration(id);
            const isCustom = customDuration > 0;
            const duration = isCustom ? customDuration : estimateAutoSceneDuration(id);
            return { id, duration, isCustom };
        }

        function renderTimelinePreview() {
            if (!DOM.timelineTrack || !DOM.timelineTotal || !DOM.sceneDurationSummary) return;

            const cards = [...document.querySelectorAll('.scene-card')];
            if (!cards.length) {
                DOM.timelineTrack.innerHTML = '<div class="timeline-empty">暂无场景</div>';
                DOM.timelineTotal.innerText = '00:00';
                DOM.sceneDurationSummary.innerText = '总时长预估: 00:00';
                return;
            }

            const items = cards.map(getSceneTimelineMeta);
            const total = items.reduce((sum, item) => sum + item.duration, 0);

            DOM.timelineTrack.innerHTML = '';
            items.forEach((item, idx) => {
                const seg = document.createElement('div');
                seg.className = 'timeline-segment';
                seg.style.flex = `${item.duration.toFixed(2)} 1 0`;
                if (item.isCustom) {
                    seg.style.background = 'linear-gradient(135deg, rgba(25, 205, 168, 0.84), rgba(36, 114, 134, 0.8))';
                    seg.style.borderColor = 'rgba(146, 255, 226, 0.4)';
                }
                const secLabel = item.duration >= 10 ? Math.round(item.duration) : item.duration.toFixed(1);
                seg.innerText = `S${idx + 1} ${secLabel}s`;
                seg.title = `场景 ${idx + 1}: ${item.isCustom ? '自定义' : '自动预估'} ${item.duration.toFixed(1)} 秒`;
                DOM.timelineTrack.appendChild(seg);
            });

            const totalLabel = formatDurationClock(total);
            DOM.timelineTotal.innerText = totalLabel;
            DOM.sceneDurationSummary.innerText = `总时长预估: ${totalLabel}`;
        }

        function updateSceneCounter() {
            const count = document.querySelectorAll('.scene-card').length;
            DOM.sceneCounter.innerText = `场景: ${count}`;
            renderTimelinePreview();
        }

        function releaseObjectUrls() {
            Engine.objectUrls.forEach(url => URL.revokeObjectURL(url));
            Engine.objectUrls = [];
        }

        function clearPlaybackState() {
            clearTimeout(Engine.sceneTimer);
            Engine.sceneTimer = null;
            DOM.player.oncanplay = null;
            DOM.player.onloadeddata = null;
            DOM.player.onended = null;
            DOM.player.onerror = null;
            if (Engine.activeVoice) {
                try { Engine.activeVoice.stop(); } catch (e) {}
                Engine.activeVoice.disconnect();
                Engine.activeVoice = null;
            }
            if (Engine.activeVoiceEl) {
                Engine.activeVoiceEl.onended = null;
                Engine.activeVoiceEl.onerror = null;
                try { Engine.activeVoiceEl.pause(); } catch (e) {}
                Engine.activeVoiceEl = null;
            }
            if (Engine.activeVoiceNode) {
                try { Engine.activeVoiceNode.disconnect(); } catch (e) {}
                Engine.activeVoiceNode = null;
            }
        }

        function addScene() {
            sceneCount++;
            const id = sceneCount;
            const html = `
                <div class="scene-card" id="scene-${id}" data-scene-id="${id}">
                    <div class="scene-header">
                        <span>场景 ${id}</span>
                        <button class="scene-remove" onclick="removeScene(${id})">删除</button>
                    </div>

                    <div class="scene-meta-grid">
                        <div class="ctrl-group">
                            <label>素材来源</label>
                            <select id="source-${id}" onchange="toggleSource(${id})">
                                <option value="pexels">自动搜索 Pexels 视频</option>
                                <option value="local">上传本地视频素材</option>
                            </select>
                        </div>
                        <div class="ctrl-group">
                            <label>时长秒数</label>
                            <div class="duration-input-wrap">
                                <input type="number" id="duration-${id}" min="0" max="600" step="0.5" value="0" placeholder="0=自动">
                                <button type="button" class="chip-btn" onclick="setAutoDuration(${id})">自动</button>
                            </div>
                            <span class="duration-hint">0 = 自动按配音/视频时长</span>
                        </div>
                    </div>

                    <div id="input-pexels-${id}" class="ctrl-group">
                        <label>Pexels 英文关键词</label>
                        <input type="text" id="keyword-${id}" placeholder="例如: nature, cyberpunk city">
                    </div>

                    <div id="input-local-${id}" class="ctrl-group" style="display:none;">
                        <label>本地视频文件</label>
                        <input type="file" id="file-${id}" accept="video/*">
                    </div>

                    <div class="ctrl-group">
                        <label>配音角色</label>
                        <select id="voice-${id}">
                            <option value="1">标准男声</option>
                            <option value="0">标准女声</option>
                            <option value="3">情感男声(度逍遥)</option>
                            <option value="4">童音(度丫丫)</option>
                        </select>
                    </div>

                    <div class="ctrl-group">
                        <label>旁白字幕 (将生成配音)</label>
                        <textarea id="text-${id}" rows="2" placeholder="在此输入解说词..."></textarea>
                    </div>
                </div>
            `;
            document.getElementById('scenesContainer').insertAdjacentHTML('beforeend', html);
            updateSceneCounter();
        }

        function setAutoDuration(id) {
            const input = document.getElementById(`duration-${id}`);
            if (!input) return;
            input.value = '0';
            renderTimelinePreview();
        }

        function removeScene(id) {
            const card = document.getElementById(`scene-${id}`);
            if (!card) return;

            const cards = document.querySelectorAll('.scene-card');
            if (cards.length <= 1) {
                alert('至少保留一个场景。');
                return;
            }
            card.remove();
            updateSceneCounter();
        }

        function toggleSource(id) {
            const val = document.getElementById(`source-${id}`).value;
            document.getElementById(`input-pexels-${id}`).style.display = val === 'pexels' ? 'block' : 'none';
            document.getElementById(`input-local-${id}`).style.display = val === 'local' ? 'block' : 'none';
            renderTimelinePreview();
        }

        document.getElementById('scenesContainer').addEventListener('input', () => {
            renderTimelinePreview();
        });
        document.getElementById('scenesContainer').addEventListener('change', () => {
            renderTimelinePreview();
        });

        addScene();

        function bgmTrackKey(file) {
            return `${file.name}__${file.size}__${file.lastModified}`;
        }

        function refreshBgmLibraryList() {
            const prevSelected = new Set(
                [...DOM.bgmLibraryList.selectedOptions].map(opt => opt.value)
            );
            DOM.bgmLibraryList.innerHTML = '';
            Engine.bgmLibrary.forEach((entry, idx) => {
                const option = document.createElement('option');
                option.value = entry.id;
                option.text = `${idx + 1}. ${entry.name}`;
                if (prevSelected.has(entry.id)) option.selected = true;
                DOM.bgmLibraryList.appendChild(option);
            });
        }

        function addBgmFilesToLibrary(fileList) {
            const files = [...(fileList || [])];
            if (!files.length) return;
            const existing = new Set(Engine.bgmLibrary.map(item => item.id));
            const addedIds = [];
            files.forEach((file) => {
                const id = bgmTrackKey(file);
                if (existing.has(id)) return;
                existing.add(id);
                Engine.bgmLibrary.push({
                    id,
                    name: file.name,
                    file,
                    buffer: null
                });
                addedIds.push(id);
            });
            refreshBgmLibraryList();
            if (addedIds.length) {
                [...DOM.bgmLibraryList.options].forEach((opt) => {
                    if (addedIds.includes(opt.value)) opt.selected = true;
                });
            }
        }

        function getSelectedBgmEntries() {
            const selectedIds = new Set([...DOM.bgmLibraryList.selectedOptions].map(opt => opt.value));
            return Engine.bgmLibrary.filter(item => selectedIds.has(item.id));
        }

        function removeSelectedBgmTracks() {
            const selectedIds = new Set([...DOM.bgmLibraryList.selectedOptions].map(opt => opt.value));
            if (!selectedIds.size) return;
            Engine.bgmLibrary = Engine.bgmLibrary.filter(item => !selectedIds.has(item.id));
            refreshBgmLibraryList();
        }

        DOM.bgmInput.addEventListener('change', (e) => {
            addBgmFilesToLibrary(e.target.files);
            DOM.bgmInput.value = '';
        });
        DOM.removeBgmBtn.addEventListener('click', removeSelectedBgmTracks);
        DOM.clearBgmBtn.addEventListener('click', () => {
            Engine.bgmLibrary = [];
            refreshBgmLibraryList();
        });

        function syncTextInspector() {
            const disabled = !activeTextBox;
            DOM.textEditContent.disabled = disabled;
            DOM.textEditColor.disabled = disabled;
            DOM.textEditSize.disabled = disabled;
            DOM.textEditHex.disabled = disabled;
            DOM.textEditX.disabled = disabled;
            DOM.textEditY.disabled = disabled;
            DOM.textStylePreset.disabled = disabled;

            if (disabled) {
                DOM.textEditContent.value = '';
                DOM.textEditColor.value = '#ffffff';
                DOM.textEditSize.value = 24;
                DOM.textEditHex.value = '#ffffff';
                DOM.textEditX.value = 30;
                DOM.textEditY.value = 30;
                DOM.textStylePreset.value = 'custom';
                return;
            }

            DOM.textEditContent.value = activeTextBox.text;
            DOM.textEditColor.value = activeTextBox.color;
            DOM.textEditSize.value = Math.round(activeTextBox.size);
            DOM.textEditHex.value = activeTextBox.color;
            DOM.textStylePreset.value = 'custom';
            syncActiveTextPositionInputs();
        }

        function syncActiveTextPositionInputs() {
            if (!activeTextBox) return;
            DOM.textEditX.value = formatPct(activeTextBox.x_pct * 100);
            DOM.textEditY.value = formatPct(activeTextBox.y_pct * 100);
        }

        function renderColorPresetBar(container, onPick) {
            if (!container) return;
            container.innerHTML = '';
            COMMON_COLOR_PRESETS.forEach((color) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'color-preset-btn';
                btn.style.background = color;
                btn.title = color;
                btn.setAttribute('aria-label', `使用颜色 ${color}`);
                btn.addEventListener('click', () => onPick(color));
                container.appendChild(btn);
            });
        }

        function getActiveSubtitleStyle() {
            return SUBTITLE_STYLE_PRESETS[Engine.subtitleStyleKey] || SUBTITLE_STYLE_PRESETS.classic;
        }

        function setMainFontColor(raw) {
            const normalized = normalizeHexColor(raw);
            if (!normalized) return false;
            DOM.fontColor.value = normalized;
            DOM.fontColorHex.value = normalized;
            applySubtitlePreviewStyle();
            return true;
        }

        function applySubtitleStylePreset(key, applyColor = true) {
            if (!SUBTITLE_STYLE_PRESETS[key]) key = 'classic';
            Engine.subtitleStyleKey = key;
            if (DOM.subtitleStylePreset.value !== key) DOM.subtitleStylePreset.value = key;
            if (applyColor) setMainFontColor(SUBTITLE_STYLE_PRESETS[key].color);
            applySubtitlePreviewStyle();
        }

        function applyActiveTextPreset(presetKey) {
            if (!activeTextBox) return;
            const preset = TEXT_STYLE_PRESETS[presetKey];
            if (!preset) return;
            activeTextBox.color = preset.color;
            activeTextBox.size = preset.size;
            DOM.textEditColor.value = preset.color;
            DOM.textEditHex.value = preset.color;
            DOM.textEditSize.value = Math.round(preset.size);
            applyTextStyle(activeTextBox);
            applyTextPositionFromPct(activeTextBox);
        }

        function selectTextBox(txtObj) {
            activeTextBox = txtObj;
            Engine.textBoxes.forEach(item => item.el.classList.remove('active'));
            txtObj.el.classList.add('active');
            syncTextInspector();
        }

        function applyTextStyle(txtObj) {
            if (txtObj.contentEl) txtObj.contentEl.innerText = txtObj.text;
            else txtObj.el.innerText = txtObj.text;
            txtObj.el.style.color = txtObj.color;
            txtObj.el.style.fontSize = `${txtObj.size}px`;
            txtObj.el.style.fontFamily = document.getElementById('fontFamily').value;
        }

        function applyTextPositionFromPct(txtObj) {
            const w = DOM.preview.clientWidth || 1;
            const h = DOM.preview.clientHeight || 1;
            const maxL = Math.max(0, w - txtObj.el.offsetWidth);
            const maxT = Math.max(0, h - txtObj.el.offsetHeight);
            const left = clampNum(txtObj.x_pct * w, 0, maxL);
            const top = clampNum(txtObj.y_pct * h, 0, maxT);
            txtObj.el.style.left = `${left}px`;
            txtObj.el.style.top = `${top}px`;
            txtObj.x_pct = w ? left / w : 0;
            txtObj.y_pct = h ? top / h : 0;
            if (txtObj === activeTextBox) syncActiveTextPositionInputs();
        }

        function repositionTextBoxes() {
            Engine.textBoxes.forEach(txt => applyTextPositionFromPct(txt));
        }

        function addTextBox() {
            const id = `txt_${Date.now()}`;
            const el = document.createElement('div');
            const txtObj = {
                id,
                el,
                contentEl: null,
                resizeHandle: null,
                text: '双击修改',
                x_pct: 0.3,
                y_pct: 0.3,
                color: '#ffffff',
                size: 24
            };

            el.className = 'draggable-text';
            el.dataset.textId = id;
            const contentEl = document.createElement('span');
            contentEl.className = 'draggable-text-content';
            const resizeHandle = document.createElement('span');
            resizeHandle.className = 'text-resize-handle';
            resizeHandle.title = '拖动调整文本大小';
            el.appendChild(contentEl);
            el.appendChild(resizeHandle);
            txtObj.contentEl = contentEl;
            txtObj.resizeHandle = resizeHandle;
            applyTextStyle(txtObj);

            Engine.textBoxes.push(txtObj);
            DOM.textLayer.appendChild(el);

            makeDraggable(el, txtObj);
            makeEditable(el, txtObj);
            makeResizable(resizeHandle, txtObj);

            requestAnimationFrame(() => {
                applyTextPositionFromPct(txtObj);
                selectTextBox(txtObj);
            });
        }

        function deleteActiveTextBox() {
            if (!activeTextBox) return;
            const id = activeTextBox.id;
            activeTextBox.el.remove();
            Engine.textBoxes = Engine.textBoxes.filter(t => t.id !== id);
            activeTextBox = null;
            syncTextInspector();
        }

        function makeDraggable(el, txtObj) {
            el.addEventListener('pointerdown', (e) => {
                if (e.target === txtObj.resizeHandle) return;
                e.preventDefault();
                selectTextBox(txtObj);
                Engine.dragState.box = txtObj;
                Engine.dragState.startX = e.clientX;
                Engine.dragState.startY = e.clientY;
                Engine.dragState.startL = el.offsetLeft;
                Engine.dragState.startT = el.offsetTop;
                el.style.cursor = 'grabbing';
            });
        }

        function makeEditable(el, txtObj) {
            el.addEventListener('dblclick', (e) => {
                if (e.target === txtObj.resizeHandle) return;
                const nt = prompt('修改文字：', txtObj.text);
                if (nt !== null && nt.trim() !== '') {
                    txtObj.text = nt.trim();
                    applyTextStyle(txtObj);
                    syncTextInspector();
                }
            });

            el.addEventListener('click', (e) => {
                if (e.target === txtObj.resizeHandle) return;
                selectTextBox(txtObj);
            });
        }

        function makeResizable(handle, txtObj) {
            handle.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                selectTextBox(txtObj);
                Engine.resizeState.box = txtObj;
                Engine.resizeState.startX = e.clientX;
                Engine.resizeState.startY = e.clientY;
                Engine.resizeState.startSize = txtObj.size;
            });
        }

        document.addEventListener('pointermove', (e) => {
            const resizeTarget = Engine.resizeState.box;
            if (resizeTarget) {
                const dx = e.clientX - Engine.resizeState.startX;
                const dy = e.clientY - Engine.resizeState.startY;
                const newSize = clampNum(Engine.resizeState.startSize + (dx + dy) * 0.35, 12, 300);
                resizeTarget.size = newSize;
                applyTextStyle(resizeTarget);
                applyTextPositionFromPct(resizeTarget);
                if (resizeTarget === activeTextBox) {
                    DOM.textEditSize.value = Math.round(newSize);
                }
                return;
            }

            const target = Engine.dragState.box;
            if (!target) return;

            const dx = e.clientX - Engine.dragState.startX;
            const dy = e.clientY - Engine.dragState.startY;
            const maxL = DOM.preview.clientWidth - target.el.offsetWidth;
            const maxT = DOM.preview.clientHeight - target.el.offsetHeight;
            const newL = Math.max(0, Math.min(maxL, Engine.dragState.startL + dx));
            const newT = Math.max(0, Math.min(maxT, Engine.dragState.startT + dy));

            target.el.style.left = `${newL}px`;
            target.el.style.top = `${newT}px`;

            target.x_pct = DOM.preview.clientWidth ? newL / DOM.preview.clientWidth : 0;
            target.y_pct = DOM.preview.clientHeight ? newT / DOM.preview.clientHeight : 0;
            if (target === activeTextBox) syncActiveTextPositionInputs();
        });
