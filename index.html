        function getPreferredMimeType() {
            if (typeof MediaRecorder === 'undefined') return '';
            const candidates = [
                'video/webm;codecs=vp9,opus',
                'video/webm;codecs=vp8,opus',
                'video/webm;codecs=vp8',
                'video/webm'
            ];
            return candidates.find(type => MediaRecorder.isTypeSupported(type)) || '';
        }

        function createMediaRecorderForStream(stream) {
            const mimeType = getPreferredMimeType();
            if (!mimeType) return new MediaRecorder(stream);
            try {
                return new MediaRecorder(stream, { mimeType });
            } catch (err) {
                console.warn(`MediaRecorder 初始化 ${mimeType} 失败，降级为浏览器默认。`, err);
                return new MediaRecorder(stream);
            }
        }

        function requestRecorderStop(recorder, delayMs = 80) {
            if (!recorder || recorder.state === 'inactive') return;
            try { recorder.requestData(); } catch (e) {}
            setTimeout(() => {
                if (recorder.state !== 'inactive') {
                    try { recorder.stop(); } catch (err) {}
                }
            }, delayMs);
        }

        async function getVideoDuration(url) {
            return new Promise((resolve) => {
                const probe = document.createElement('video');
                let done = false;
                const finalize = (val) => {
                    if (done) return;
                    done = true;
                    probe.removeAttribute('src');
                    probe.load();
                    resolve(val);
                };

                probe.preload = 'metadata';
                probe.onloadedmetadata = () => {
                    const duration = Number.isFinite(probe.duration) && probe.duration > 0 ? probe.duration : 4;
                    finalize(duration);
                };
                probe.onerror = () => finalize(4);
                probe.src = url;
                probe.load();
                setTimeout(() => finalize(4), 7000);
            });
        }

        async function fetchRemoteAssetToObjectUrl(url) {
            if (!isRemoteHttpUrl(url)) return { url, fromRemote: false };
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) throw new Error(`请求失败(${res.status})`);
            const blob = await res.blob();
            if (!blob.size) throw new Error('返回空数据');
            const localUrl = URL.createObjectURL(blob);
            Engine.objectUrls.push(localUrl);
            return { url: localUrl, fromRemote: true, blob };
        }

        async function tryDecodeAudioArrayBuffer(arr) {
            try {
                return await Engine.audioCtx.decodeAudioData(arr.slice(0));
            } catch (err) {
                return null;
            }
        }

        async function fetchAudioAssetFromUrl(url) {
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) throw new Error(`音频请求失败(${res.status})`);
            const arr = await res.arrayBuffer();
            const decoded = await tryDecodeAudioArrayBuffer(arr);
            const mimeType = res.headers.get('content-type') || 'audio/mpeg';
            const blob = new Blob([arr], { type: mimeType.includes('audio') ? mimeType : 'audio/mpeg' });
            const blobUrl = URL.createObjectURL(blob);
            Engine.objectUrls.push(blobUrl);

            let duration = decoded ? (decoded.duration || 0) : 0;
            if (!duration) {
                duration = await getAudioDuration(blobUrl);
            }
            return {
                audioBuffer: decoded,
                audioUrl: blobUrl,
                duration: duration || 0
            };
        }

        async function getAudioDuration(url) {
            return new Promise((resolve) => {
                const probe = document.createElement('audio');
                let done = false;
                const finalize = (val) => {
                    if (done) return;
                    done = true;
                    probe.removeAttribute('src');
                    probe.load();
                    resolve(val);
                };

                probe.preload = 'metadata';
                probe.onloadedmetadata = () => {
                    const duration = Number.isFinite(probe.duration) && probe.duration > 0 ? probe.duration : 0;
                    finalize(duration);
                };
                probe.onerror = () => finalize(0);
                probe.src = url;
                probe.load();
                setTimeout(() => finalize(0), 7000);
            });
        }

        function buildTtsCandidateUrls(text, voiceId) {
            const baiduUrl = `https://tts.baidu.com/text2audio?tex=${encodeURIComponent(text)}&cuid=web&lan=ZH&ctp=1&pdt=301&vol=9&rate=32&per=${voiceId}`;
            const seVoiceMap = {
                '0': ['Zhiyu', 'zh-CN-XiaoxiaoNeural'],
                '1': ['zh-CN-YunxiNeural', 'Zhiyu'],
                '3': ['zh-CN-YunjianNeural', 'Zhiyu'],
                '4': ['zh-CN-XiaoxiaoNeural', 'Zhiyu']
            };
            const seVoices = seVoiceMap[voiceId] || ['Zhiyu'];
            const seUrls = seVoices.map(voice => (
                `https://api.streamelements.com/kappa/v2/speech?voice=${encodeURIComponent(voice)}&text=${encodeURIComponent(text)}`
            ));
            return [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(baiduUrl)}`,
                baiduUrl,
                ...seUrls
            ];
        }

        async function fetchTTSAsset(text, voiceId) {
            const candidates = buildTtsCandidateUrls(text, voiceId);

            for (const candidate of candidates) {
                try {
                    const asset = await fetchAudioAssetFromUrl(candidate);
                    if (asset.audioBuffer || asset.duration > 0) return asset;
                } catch (err) {
                    console.warn('TTS 解码失败:', candidate);
                }
            }

            for (const candidate of candidates) {
                const duration = await getAudioDuration(candidate);
                if (duration > 0) {
                    return {
                        audioBuffer: null,
                        audioUrl: candidate,
                        duration
                    };
                }
            }

            return {
                audioBuffer: null,
                audioUrl: null,
                duration: 0
            };
        }

        function getTargetResolution() {
            return document.getElementById('videoSize').value.split(',').map(Number);
        }

        async function ensureAudioContextReady() {
            if (!Engine.audioCtx) Engine.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (Engine.audioCtx.state === 'suspended') await Engine.audioCtx.resume();
        }

        async function runWithLimit(items, limit, task) {
            const results = new Array(items.length);
            let cursor = 0;
            const workers = new Array(Math.max(1, limit)).fill(0).map(async () => {
                while (cursor < items.length) {
                    const idx = cursor++;
                    results[idx] = await task(items[idx], idx);
                }
            });
            await Promise.all(workers);
            return results;
        }

        function scorePexelsFile(file, targetW, targetH) {
            const ratio = (file.width || 1) / (file.height || 1);
            const targetRatio = targetW / targetH;
            const ratioPenalty = Math.abs(ratio - targetRatio) * 18;
            const pixels = Math.max(1, (file.width || 1) * (file.height || 1));
            const targetPixels = Math.max(1, targetW * targetH);
            const scale = pixels / targetPixels;
            const oversizePenalty = scale > 1 ? (scale - 1) * 0.6 : (1 - scale) * 1.0;
            const hugePenalty = scale > 4 ? (scale - 4) * 1.2 : 0;
            return ratioPenalty + oversizePenalty + hugePenalty;
        }

        function pickBestPexelsFile(video, targetW, targetH) {
            const files = (video.video_files || [])
                .filter(item => item && item.link && item.width && item.height);
            if (!files.length) return null;
            return files.sort((a, b) => scorePexelsFile(a, targetW, targetH) - scorePexelsFile(b, targetW, targetH))[0];
        }

        function pickUniqueVideoByKeyword(videos, usedIds, targetW, targetH) {
            const pool = videos
                .filter(v => !usedIds.has(String(v.id)))
                .map(v => ({ video: v, file: pickBestPexelsFile(v, targetW, targetH) }))
                .filter(item => item.file && item.file.link);
            if (!pool.length) return null;
            pool.sort((a, b) => scorePexelsFile(a.file, targetW, targetH) - scorePexelsFile(b.file, targetW, targetH));
            const picked = pool[0];
            usedIds.add(String(picked.video.id));
            return {
                videoId: String(picked.video.id),
                videoUrl: picked.file.link
            };
        }

        function collectSceneDrafts() {
            const cards = [...document.querySelectorAll('.scene-card')];
            if (!cards.length) throw new Error('请至少添加一个场景。');

            return cards.map((card, idx) => {
                const id = card.dataset.sceneId;
                const source = document.getElementById(`source-${id}`).value;
                const text = document.getElementById(`text-${id}`).value.trim();
                const voiceId = document.getElementById(`voice-${id}`).value;
                const customDuration = readCustomSceneDuration(id);
                const hasCustomDuration = customDuration > 0;

                if (source === 'pexels') {
                    const keyword = document.getElementById(`keyword-${id}`).value.trim();
                    if (!keyword) throw new Error(`场景 ${idx + 1} 请选择关键词。`);
                    return { idx, id, source, keyword, text, voiceId, customDuration, hasCustomDuration };
                }

                const file = document.getElementById(`file-${id}`).files[0];
                if (!file) throw new Error(`请为场景 ${idx + 1} 上传本地视频。`);
                return { idx, id, source, file, text, voiceId, customDuration, hasCustomDuration };
            });
        }

        async function assignPexelsVideos(drafts, apiKey, targetW, targetH) {
            const keywordMap = new Map();
            drafts.forEach((draft) => {
                if (draft.source !== 'pexels') return;
                const key = draft.keyword.toLowerCase();
                if (!keywordMap.has(key)) keywordMap.set(key, []);
                keywordMap.get(key).push(draft);
            });
            if (!keywordMap.size) return;

            const keywordList = [...keywordMap.keys()];
            const pools = await Promise.all(keywordList.map(async (kw) => {
                const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(kw)}&per_page=20`, {
                    headers: { Authorization: apiKey }
                });
                if (!res.ok) throw new Error(`关键词 '${kw}' 请求失败 (${res.status})`);
                const data = await res.json();
                const videos = data.videos || [];
                if (!videos.length) throw new Error(`未找到关键词 '${kw}' 的可用视频。`);
                return [kw, videos];
            }));

            pools.forEach(([kw, videos]) => {
                const usedIds = new Set();
                const group = keywordMap.get(kw) || [];
                group.forEach((draft) => {
                    const picked = pickUniqueVideoByKeyword(videos, usedIds, targetW, targetH);
                    if (!picked) {
                        throw new Error(`关键词 '${kw}' 可用去重视频不足，请更换关键词或减少同词场景数。`);
                    }
                    draft.videoUrl = picked.videoUrl;
                    draft.videoId = picked.videoId;
                });
            });
        }

        async function decodeSelectedBgmBuffers() {
            const selected = getSelectedBgmEntries();
            if (!selected.length) {
                Engine.bgmBuffers = [];
                return;
            }

            const decoded = await runWithLimit(selected, 2, async (entry) => {
                if (entry.buffer) return entry.buffer;
                try {
                    const arr = await entry.file.arrayBuffer();
                    entry.buffer = await Engine.audioCtx.decodeAudioData(arr.slice(0));
                    return entry.buffer;
                } catch (err) {
                    console.warn('BGM 解码失败:', entry.name, err);
                    return null;
                }
            });
            Engine.bgmBuffers = decoded.filter(Boolean);
        }

        function stopBgmSources() {
            Engine.activeBgmSources.forEach((node) => {
                try { node.src.stop(); } catch (e) {}
                try { node.src.disconnect(); } catch (e) {}
                try { node.gain.disconnect(); } catch (e) {}
            });
            Engine.activeBgmSources = [];
        }

        function startBgmSources(dest) {
            stopBgmSources();
            if (!Engine.bgmBuffers.length || !Engine.audioCtx) return;
            const volume = parseFloat(DOM.bgmVolume.value) || 0;
            const trackCount = Math.max(1, Engine.bgmBuffers.length);
            const perTrackVol = volume / Math.sqrt(trackCount);

            Engine.activeBgmSources = Engine.bgmBuffers.map((buffer) => {
                const src = Engine.audioCtx.createBufferSource();
                const gain = Engine.audioCtx.createGain();
                src.buffer = buffer;
                src.loop = true;
                gain.gain.value = perTrackVol;
                src.connect(gain).connect(dest);
                gain.connect(Engine.audioCtx.destination);
                src.start(0);
                return { src, gain };
            });
        }

        function updateActionButtons() {
            DOM.playRecordBtn.disabled = !Engine.scenes.length || Engine.isBatchExporting || Engine.isPlaying;
            DOM.downloadBtn.disabled = !Engine.mergedBlob || Engine.isBatchExporting || Engine.isPlaying;
            DOM.downloadScenesBtn.disabled = !Engine.scenes.length || Engine.isBatchExporting || Engine.isPlaying;
        }

        function triggerBlobDownload(blob, filenameBase) {
            const outputType = blob && blob.type ? blob.type : 'video/webm';
            const ext = outputType.includes('mp4') ? 'mp4' : 'webm';
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${filenameBase}.${ext}`;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1800);
        }

        DOM.generateBtn.onclick = async function () {
            DOM.generateBtn.disabled = true;
            DOM.playRecordBtn.disabled = true;
            DOM.playRecordBtn.innerText = '第二步: 播放并录制';
            DOM.downloadBtn.disabled = true;
            DOM.downloadScenesBtn.disabled = true;
            Engine.scenes = [];
            Engine.mergedBlob = null;
            Engine.recordedChunks = [];
            clearPlaybackState();
            releaseObjectUrls();
            setStatus('资产解析中', 'busy');

            try {
                log('正在并行解析场景资产...');
                await ensureAudioContextReady();
                await decodeSelectedBgmBuffers();

                const drafts = collectSceneDrafts();
                const hasPexels = drafts.some(d => d.source === 'pexels');
                if (hasPexels) {
                    const key = pexelsInput.value.trim();
                    if (!key) throw new Error('请先填写 Pexels API Key。');
                    const [targetW, targetH] = getTargetResolution();
                    await assignPexelsVideos(drafts, key, targetW, targetH);
                }

                const builtScenes = await runWithLimit(drafts, 4, async (draft, idx) => {
                    log(`并行处理中 ${idx + 1}/${drafts.length}...`);

                    let videoUrl = draft.videoUrl || null;
                    if (draft.source === 'local') {
                        videoUrl = URL.createObjectURL(draft.file);
                        Engine.objectUrls.push(videoUrl);
                    }
                    if (!videoUrl) throw new Error(`场景 ${idx + 1} 未找到可用视频。`);

                    if (isRemoteHttpUrl(videoUrl)) {
                        try {
                            const cachedVideo = await fetchRemoteAssetToObjectUrl(videoUrl);
                            videoUrl = cachedVideo.url;
                        } catch (err) {
                            log(`场景 ${idx + 1} 视频走直连模式（可能受跨域限制）。`);
                        }
                    }

                    const ttsPromise = draft.text
                        ? fetchTTSAsset(draft.text, draft.voiceId)
                        : Promise.resolve({ audioBuffer: null, audioUrl: null, duration: 0 });
                    const videoDurationPromise = getVideoDuration(videoUrl);
                    const [ttsAsset, videoDurationRaw] = await Promise.all([ttsPromise, videoDurationPromise]);

                    const estimatedSpeechDuration = draft.text ? clampNum(draft.text.length / 4.2, 1.6, 45) : 0;
                    const ttsDuration = ttsAsset.duration || estimatedSpeechDuration || 0;
                    const videoDuration = Math.max(1, videoDurationRaw || 4);
                    const autoDuration = ttsDuration || videoDuration || 4;
                    const duration = draft.hasCustomDuration ? draft.customDuration : autoDuration;

                    return {
                        id: draft.id,
                        videoUrl,
                        text: draft.text,
                        audioBuffer: ttsAsset.audioBuffer,
                        ttsUrl: ttsAsset.audioUrl,
                        videoDuration,
                        duration: Math.max(0.5, duration || 4),
                        hasCustomDuration: draft.hasCustomDuration
                    };
                });

                Engine.scenes = builtScenes;
                log(`资产解析完成，共 ${Engine.scenes.length} 个场景。`, 'success');
                setStatus('资产就绪', 'ok');
            } catch (err) {
                console.error(err);
                Engine.scenes = [];
                Engine.mergedBlob = null;
                log(`解析失败: ${err.message}`, 'error');
                setStatus('解析失败', 'error');
                alert(err.message || '资产解析失败，请检查输入后重试。');
            } finally {
                DOM.generateBtn.disabled = false;
                updateActionButtons();
            }
        };

        DOM.playRecordBtn.onclick = async function () {
            if (!Engine.scenes.length) {
                alert('请先执行第一步解析场景资产。');
                return;
            }
            if (typeof MediaRecorder === 'undefined') {
                alert('当前浏览器不支持 MediaRecorder，无法进行录制下载。');
                return;
            }

            await ensureAudioContextReady();

            log('启动混流渲染管线...');
            setStatus('录制中', 'busy');
            DOM.playRecordBtn.disabled = true;
            DOM.playRecordBtn.innerText = '录制中...';
            DOM.downloadBtn.disabled = true;
            DOM.downloadScenesBtn.disabled = true;

            Engine.isPlaying = true;
            Engine.currentIdx = 0;
            Engine.recordedChunks = [];
            Engine.mergedBlob = null;

            const [w, h] = getTargetResolution();
            DOM.canvas.width = w;
            DOM.canvas.height = h;

            clearPlaybackState();

            const dest = Engine.audioCtx.createMediaStreamDestination();
            try {
                startBgmSources(dest);
                const vStream = DOM.canvas.captureStream(30);
                const mixStream = new MediaStream([...vStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
                Engine.mediaRecorder = createMediaRecorderForStream(mixStream);
            } catch (err) {
                console.error(err);
                stopBgmSources();
                Engine.isPlaying = false;
                DOM.playRecordBtn.disabled = false;
                DOM.playRecordBtn.innerText = '第二步: 播放并录制';
                setStatus('录制失败', 'error');
                log(`录制器初始化失败: ${err.message || err}`, 'error');
                updateActionButtons();
                return;
            }

            Engine.mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) Engine.recordedChunks.push(e.data);
            };
            Engine.mediaRecorder.onerror = (e) => {
                console.error('MediaRecorder 错误:', e);
                log('录制器发生错误，正在停止录制。', 'error');
                setStatus('录制失败', 'error');
                if (Engine.mediaRecorder && Engine.mediaRecorder.state !== 'inactive') {
                    requestRecorderStop(Engine.mediaRecorder, 0);
                }
            };

            Engine.mediaRecorder.onstop = () => {
                clearPlaybackState();
                stopBgmSources();
                Engine.isPlaying = false;
                cancelAnimationFrame(Engine.animFrame);
                DOM.player.pause();
                DOM.player.removeAttribute('src');
                DOM.player.load();
                DOM.player.style.display = 'none';
                DOM.subtitle.innerText = '';

                DOM.playRecordBtn.disabled = false;
                DOM.playRecordBtn.innerText = '重新录制';
                if (Engine.recordedChunks.length > 0) {
                    Engine.mergedBlob = new Blob(Engine.recordedChunks, {
                        type: (Engine.recordedChunks[0] && Engine.recordedChunks[0].type) || 'video/webm'
                    });
                    log('视频录制结束，可下载合并视频或分场景视频。', 'success');
                    setStatus('录制完成', 'ok');
                } else {
                    Engine.mergedBlob = null;
                    log('录制结束但未生成可下载数据，请重试。', 'error');
                    setStatus('录制无数据', 'error');
                }
                updateActionButtons();
            };

            try {
                Engine.mediaRecorder.start(180);
            } catch (err) {
                console.error(err);
                stopBgmSources();
                DOM.playRecordBtn.disabled = false;
                DOM.playRecordBtn.innerText = '第二步: 播放并录制';
                Engine.isPlaying = false;
                setStatus('录制失败', 'error');
                log(`录制启动失败: ${err.message || err}`, 'error');
                updateActionButtons();
                return;
            }
            playNextScene(dest);
            renderLoop();
        };

        function playNextScene(dest) {
            if (!Engine.isPlaying) return;

            if (Engine.currentIdx >= Engine.scenes.length) {
                Engine.isPlaying = false;
                if (Engine.mediaRecorder && Engine.mediaRecorder.state !== 'inactive') {
                    requestRecorderStop(Engine.mediaRecorder);
                }
                return;
            }

            clearPlaybackState();
            const scene = Engine.scenes[Engine.currentIdx];
            log(`正在渲染场景 ${Engine.currentIdx + 1}/${Engine.scenes.length}...`);

            DOM.player.style.display = 'block';
            DOM.player.loop = scene.duration > (scene.videoDuration || 0) + 0.05;
            DOM.player.src = scene.videoUrl;
            DOM.player.load();
            DOM.subtitle.innerText = scene.text || '';
            applySubtitlePreviewStyle();

            let advanced = false;
            let sceneStarted = false;
            const advance = () => {
                if (advanced) return;
                advanced = true;
                Engine.currentIdx += 1;
                playNextScene(dest);
            };
            const loadWatchdog = setTimeout(() => {
                log(`场景 ${Engine.currentIdx + 1} 加载超时，自动跳过。`, 'error');
                advance();
            }, 12000);

            DOM.player.onended = () => {
                clearTimeout(loadWatchdog);
                if (!scene.audioBuffer && !scene.ttsUrl && !scene.hasCustomDuration) advance();
            };
            DOM.player.onerror = () => {
                clearTimeout(loadWatchdog);
                log(`场景 ${Engine.currentIdx + 1} 视频加载失败，自动跳过。`, 'error');
                advance();
            };

            const startScenePlayback = async () => {
                if (sceneStarted) return;
                sceneStarted = true;
                clearTimeout(loadWatchdog);
                try { await DOM.player.play(); } catch (e) {}

                if (scene.audioBuffer) {
                    const voice = Engine.audioCtx.createBufferSource();
                    voice.buffer = scene.audioBuffer;
                    voice.connect(dest);
                    voice.connect(Engine.audioCtx.destination);
                    Engine.activeVoice = voice;

                    voice.onended = () => {
                        if (!scene.hasCustomDuration) advance();
                    };
                    Engine.sceneTimer = setTimeout(advance, (scene.duration + 0.15) * 1000);
                    try {
                        voice.start(0);
                    } catch (err) {
                        log(`场景 ${Engine.currentIdx + 1} 配音播放失败。`, 'error');
                        if (!scene.hasCustomDuration) advance();
                    }
                } else if (scene.ttsUrl) {
                    const voiceEl = new Audio(scene.ttsUrl);
                    voiceEl.preload = 'auto';
                    voiceEl.playsInline = true;

                    try {
                        const voiceNode = Engine.audioCtx.createMediaElementSource(voiceEl);
                        voiceNode.connect(dest);
                        voiceNode.connect(Engine.audioCtx.destination);
                        Engine.activeVoiceNode = voiceNode;
                    } catch (err) {
                        console.warn('TTS 媒体节点创建失败，将直接播放音频。', err);
                    }

                    Engine.activeVoiceEl = voiceEl;
                    voiceEl.onended = () => {
                        if (!scene.hasCustomDuration) advance();
                    };
                    voiceEl.onerror = () => {
                        log(`场景 ${Engine.currentIdx + 1} 配音播放失败。`, 'error');
                        if (!scene.hasCustomDuration) advance();
                    };

                    Engine.sceneTimer = setTimeout(advance, (scene.duration + 0.2) * 1000);
                    try {
                        await voiceEl.play();
                    } catch (err) {
                        log(`场景 ${Engine.currentIdx + 1} 配音播放失败。`, 'error');
                        if (!scene.hasCustomDuration) advance();
                        return;
                    }
                } else {
                    Engine.sceneTimer = setTimeout(advance, scene.duration * 1000);
                }
            };
            DOM.player.onloadeddata = startScenePlayback;
            DOM.player.oncanplay = startScenePlayback;
        }

        function splitTextLines(ctx, text, maxWidth, maxLines) {
            const chars = [...text];
            const lines = [];
            let line = '';

            chars.forEach((ch) => {
                const test = line + ch;
                if (ctx.measureText(test).width > maxWidth && line) {
                    lines.push(line);
                    line = ch;
                } else {
                    line = test;
                }
            });

            if (line) lines.push(line);
            if (lines.length <= maxLines) return lines;

            const trimmed = lines.slice(0, maxLines);
            const last = trimmed[maxLines - 1];
            trimmed[maxLines - 1] = `${last.slice(0, Math.max(1, last.length - 1))}…`;
            return trimmed;
        }

        function renderLoop() {
            if (!Engine.isPlaying) return;

            const ctx = DOM.ctx;
            const w = DOM.canvas.width;
            const h = DOM.canvas.height;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);

            if (DOM.player.readyState >= 2) {
                const vw = DOM.player.videoWidth;
                const vh = DOM.player.videoHeight;
                if (vw && vh) {
                    const scale = Math.max(w / vw, h / vh);
                    const dw = vw * scale;
                    const dh = vh * scale;
                    try {
                        ctx.drawImage(DOM.player, (w - dw) / 2, (h - dh) / 2, dw, dh);
                    } catch (err) {}
                }
            }

            if (DOM.subtitle.innerText) {
                const subtitleStyle = getActiveSubtitleStyle();
                const fontFamily = document.getElementById('fontFamily').value;
                const fontSize = Math.max(18, Number(document.getElementById('fontSize').value) || 55);
                ctx.font = `700 ${fontSize}px ${fontFamily}`;

                const lines = splitTextLines(ctx, DOM.subtitle.innerText, w * 0.85, 3);
                const lineHeight = fontSize + 12;
                const boxHeight = lines.length * lineHeight + 24;
                const maxLineWidth = Math.max(...lines.map(line => ctx.measureText(line).width), 100);
                const boxWidth = Math.min(w * 0.92, maxLineWidth + 44);
                const boxX = (w - boxWidth) / 2;
                const boxY = h * 0.89 - boxHeight;

                ctx.fillStyle = subtitleStyle.boxColor;
                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);

                ctx.fillStyle = document.getElementById('fontColor').value;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.shadowColor = subtitleStyle.shadowColor;
                ctx.shadowBlur = subtitleStyle.shadowBlur;
                ctx.lineJoin = 'round';
                ctx.lineWidth = subtitleStyle.strokeWidth;
                ctx.strokeStyle = subtitleStyle.strokeColor;

                lines.forEach((line, i) => {
                    const lineY = boxY + 12 + i * lineHeight;
                    ctx.strokeText(line, w / 2, lineY);
                    ctx.fillText(line, w / 2, lineY);
                });

                ctx.shadowBlur = 0;
            }

            const previewH = DOM.preview.clientHeight || h;
            const textScale = h / previewH;
            const textFont = document.getElementById('fontFamily').value;

            Engine.textBoxes.forEach((txt) => {
                const renderSize = Math.max(12, txt.size * textScale);
                ctx.font = `700 ${renderSize}px ${textFont}`;
                ctx.fillStyle = txt.color;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.shadowColor = 'rgba(0,0,0,0.85)';
                ctx.shadowBlur = 6;
                ctx.fillText(txt.text, txt.x_pct * w, txt.y_pct * h);
                ctx.shadowBlur = 0;
            });

            Engine.animFrame = requestAnimationFrame(renderLoop);
        }

        function resetPreviewPlaybackState() {
            DOM.player.pause();
            DOM.player.loop = false;
            DOM.player.removeAttribute('src');
            DOM.player.load();
            DOM.player.style.display = 'none';
            DOM.subtitle.innerText = '';
        }

        async function recordSingleSceneBlob(scene, sceneIndex, totalScenes) {
            if (typeof MediaRecorder === 'undefined') {
                throw new Error('当前浏览器不支持 MediaRecorder。');
            }
            await ensureAudioContextReady();

            clearPlaybackState();
            stopBgmSources();
            Engine.recordedChunks = [];
            Engine.isPlaying = true;

            const [w, h] = getTargetResolution();
            DOM.canvas.width = w;
            DOM.canvas.height = h;

            const dest = Engine.audioCtx.createMediaStreamDestination();
            startBgmSources(dest);
            const vStream = DOM.canvas.captureStream(30);
            const mixStream = new MediaStream([...vStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
            const recorder = createMediaRecorderForStream(mixStream);

            return await new Promise((resolve, reject) => {
                let closed = false;
                let started = false;
                let loadWatchdog = null;
                const closeWithError = (err) => {
                    if (closed) return;
                    closed = true;
                    if (loadWatchdog) {
                        clearTimeout(loadWatchdog);
                        loadWatchdog = null;
                    }
                    try {
                        if (recorder.state !== 'inactive') requestRecorderStop(recorder, 0);
                    } catch (e) {}
                    clearPlaybackState();
                    stopBgmSources();
                    Engine.isPlaying = false;
                    cancelAnimationFrame(Engine.animFrame);
                    resetPreviewPlaybackState();
                    reject(err);
                };

                recorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) Engine.recordedChunks.push(e.data);
                };
                recorder.onerror = () => {
                    closeWithError(new Error(`场景 ${sceneIndex + 1} 录制器异常。`));
                };
                recorder.onstop = () => {
                    if (closed) return;
                    closed = true;
                    if (loadWatchdog) {
                        clearTimeout(loadWatchdog);
                        loadWatchdog = null;
                    }
                    clearPlaybackState();
                    stopBgmSources();
                    Engine.isPlaying = false;
                    cancelAnimationFrame(Engine.animFrame);
                    resetPreviewPlaybackState();

                    if (!Engine.recordedChunks.length) {
                        reject(new Error(`场景 ${sceneIndex + 1} 未生成录制数据。`));
                        return;
                    }
                    const outputType = (Engine.recordedChunks[0] && Engine.recordedChunks[0].type) || 'video/webm';
                    resolve(new Blob(Engine.recordedChunks, { type: outputType }));
                };

                DOM.player.style.display = 'block';
                DOM.player.loop = scene.duration > (scene.videoDuration || 0) + 0.05;
                DOM.player.src = scene.videoUrl;
                DOM.player.load();
                DOM.subtitle.innerText = scene.text || '';
                applySubtitlePreviewStyle();
                loadWatchdog = setTimeout(() => {
                    closeWithError(new Error(`场景 ${sceneIndex + 1}/${totalScenes} 视频加载超时。`));
                }, 12000);

                DOM.player.onerror = () => {
                    closeWithError(new Error(`场景 ${sceneIndex + 1}/${totalScenes} 视频加载失败。`));
                };
                const startSceneRecord = async () => {
                    if (started) return;
                    started = true;
                    if (loadWatchdog) {
                        clearTimeout(loadWatchdog);
                        loadWatchdog = null;
                    }
                    try {
                        await DOM.player.play();
                    } catch (err) {}

                    if (scene.audioBuffer) {
                        const voice = Engine.audioCtx.createBufferSource();
                        voice.buffer = scene.audioBuffer;
                        voice.connect(dest);
                        voice.connect(Engine.audioCtx.destination);
                        Engine.activeVoice = voice;
                        try { voice.start(0); } catch (err) {
                            console.warn(`场景 ${sceneIndex + 1} AudioBuffer 启动失败。`, err);
                        }
                    } else if (scene.ttsUrl) {
                        const voiceEl = new Audio(scene.ttsUrl);
                        voiceEl.preload = 'auto';
                        voiceEl.playsInline = true;

                        try {
                            const voiceNode = Engine.audioCtx.createMediaElementSource(voiceEl);
                            voiceNode.connect(dest);
                            voiceNode.connect(Engine.audioCtx.destination);
                            Engine.activeVoiceNode = voiceNode;
                        } catch (err) {
                            console.warn('分场景导出: TTS 节点创建失败。', err);
                        }

                        Engine.activeVoiceEl = voiceEl;
                        voiceEl.onerror = () => closeWithError(new Error(`场景 ${sceneIndex + 1} 配音播放失败。`));
                        try { await voiceEl.play(); } catch (err) {
                            closeWithError(new Error(`场景 ${sceneIndex + 1} 配音播放失败。`));
                            return;
                        }
                    }

                    try {
                        recorder.start(180);
                    } catch (err) {
                        closeWithError(new Error(`场景 ${sceneIndex + 1} 录制启动失败。`));
                        return;
                    }

                    Engine.sceneTimer = setTimeout(() => {
                        if (recorder.state !== 'inactive') requestRecorderStop(recorder);
                    }, (scene.duration + 0.22) * 1000);
                    renderLoop();
                };
                DOM.player.onloadeddata = startSceneRecord;
                DOM.player.oncanplay = startSceneRecord;
            });
        }

        DOM.downloadBtn.onclick = () => {
            if (!Engine.mergedBlob) {
                alert('暂无可下载的合并视频，请先录制。');
                return;
            }
            triggerBlobDownload(Engine.mergedBlob, `AI全能矩阵视频_${Date.now()}`);
            log('合并视频下载已触发。', 'success');
        };

        DOM.downloadScenesBtn.onclick = async () => {
            if (!Engine.scenes.length) {
                alert('请先执行第一步解析场景资产。');
                return;
            }
            if (Engine.isPlaying || Engine.isBatchExporting) return;

            Engine.isBatchExporting = true;
            DOM.generateBtn.disabled = true;
            DOM.playRecordBtn.disabled = true;
            DOM.downloadBtn.disabled = true;
            DOM.downloadScenesBtn.disabled = true;
            setStatus('分场景导出中', 'busy');

            let successCount = 0;
            try {
                for (let i = 0; i < Engine.scenes.length; i++) {
                    log(`正在导出场景 ${i + 1}/${Engine.scenes.length}...`);
                    try {
                        const blob = await recordSingleSceneBlob(Engine.scenes[i], i, Engine.scenes.length);
                        triggerBlobDownload(blob, `AI场景_${String(i + 1).padStart(2, '0')}_${Date.now()}`);
                        successCount += 1;
                    } catch (sceneErr) {
                        console.error(sceneErr);
                        log(sceneErr.message || `场景 ${i + 1} 导出失败。`, 'error');
                    }
                }
                if (successCount > 0) {
                    log(`分场景导出完成，成功 ${successCount}/${Engine.scenes.length}。`, 'success');
                    setStatus('分场景导出完成', 'ok');
                } else {
                    setStatus('分场景导出失败', 'error');
                }
            } finally {
                Engine.isBatchExporting = false;
                DOM.generateBtn.disabled = false;
                updateActionButtons();
            }
        };

        window.addEventListener('resize', () => {
            updatePreviewFrameSize();
            repositionTextBoxes();
        });
        setMainFontColor(DOM.fontColor.value);
        applySubtitleStylePreset(DOM.subtitleStylePreset.value, false);
        applySubtitlePreviewStyle();
        syncTextInspector();
        updateSceneCounter();
        updatePreviewRatio();
        refreshBgmLibraryList();
        updateActionButtons();
    </script>
</body>
</html>
